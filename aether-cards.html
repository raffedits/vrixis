<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER CARDS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0c060; --gold2: #ffd700;
  --purple: #7c3aed; --purple2: #a855f7;
  --blue: #1e40af; --cyan: #06b6d4;
  --red: #dc2626; --green: #16a34a;
  --bg: #050510;
  --glass: rgba(255,255,255,0.07);
  --glass2: rgba(255,255,255,0.12);
  --border-glass: rgba(255,255,255,0.18);
  --text: #e2e8f0;
  --diamond: #a8edff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow:hidden; user-select:none; }

/* BG */
.bg-canvas { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse at 20% 50%,#1a0040,transparent 60%),radial-gradient(ellipse at 80% 20%,#001a40,transparent 60%),radial-gradient(ellipse at 60% 80%,#200030,transparent 50%),#050510; }
.star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--d,3s) ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* SCREENS */
.screen { position:fixed; inset:0; z-index:10; display:none; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; }
.screen.active { display:flex; }

/* GLASS */
.glass-panel {
  background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.04));
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border-glass);
  border-radius:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);
}

/* ===== INTRO SCREEN ===== */
#intro-screen { background:#000; z-index:200; }
.intro-bg { position:absolute; inset:0; overflow:hidden; }
.intro-particle { position:absolute; border-radius:50%; pointer-events:none; }
.intro-logo-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; position:relative; z-index:10; }
.intro-logo {
  font-family:'Cinzel Decorative',serif; font-size:clamp(3rem,10vw,7rem); font-weight:900;
  background:linear-gradient(135deg,#ff6b00,#ffd700,#ff00ff,#00ffff,#ffd700,#ff6b00);
  background-size:400% 400%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  opacity:0; transform:scale(.3) rotateY(90deg);
  transition:none;
  filter:drop-shadow(0 0 60px rgba(255,200,0,.8));
  letter-spacing:.08em;
}
.intro-logo.animate {
  animation:logoReveal 2s cubic-bezier(.34,1.56,.64,1) forwards, logoShimmer 3s 2s ease-in-out infinite;
}
@keyframes logoReveal {
  0%{opacity:0;transform:scale(.3) rotateY(90deg)}
  40%{opacity:1;transform:scale(1.15) rotateY(-5deg)}
  60%{transform:scale(.95) rotateY(3deg)}
  80%{transform:scale(1.05) rotateY(-1deg)}
  100%{opacity:1;transform:scale(1) rotateY(0)}
}
@keyframes logoShimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
.intro-sub {
  font-family:'Orbitron',sans-serif; font-size:clamp(.7rem,2vw,1rem); letter-spacing:.5em;
  color:var(--cyan); opacity:0; transform:translateY(20px);
  transition:opacity .6s, transform .6s;
}
.intro-sub.show { opacity:1; transform:none; }
.intro-press {
  font-family:'Orbitron',sans-serif; font-size:.8rem; letter-spacing:.3em;
  color:rgba(255,255,255,.5); opacity:0; margin-top:40px;
  animation:blinkPulse 1.2s ease-in-out infinite;
  transition:opacity .5s;
}
.intro-press.show { opacity:1; }
@keyframes blinkPulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.intro-rays { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; opacity:0; transition:opacity .5s; }
.intro-rays.show { opacity:1; }
.ray { position:absolute; width:4px; height:150vh; background:linear-gradient(to bottom,transparent,rgba(255,215,0,.15),transparent); transform-origin:center center; }

/* ===== MENU ===== */
.menu-logo {
  font-family:'Cinzel Decorative',serif; font-size:clamp(2.5rem,7vw,5rem); font-weight:900;
  background:linear-gradient(135deg,#f0c060,#ffd700,#ff9500,#f0c060); background-size:300% 300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 3s ease-in-out infinite,float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 30px rgba(240,192,96,.6)); letter-spacing:.05em;
}
@keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.menu-subtitle { font-family:'Orbitron',sans-serif; font-size:.85rem; letter-spacing:.4em; color:var(--cyan); text-transform:uppercase; margin-top:6px; animation:pulseGlow 2s ease-in-out infinite; }
@keyframes pulseGlow { 0%,100%{opacity:.7} 50%{opacity:1;text-shadow:0 0 20px var(--cyan)} }

.menu-btn {
  display:flex; align-items:center; gap:14px;
  padding:15px 36px; font-family:'Orbitron',sans-serif; font-size:.95rem; font-weight:700;
  letter-spacing:.12em; cursor:pointer; border:none; border-radius:12px;
  transition:all .3s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden; min-width:260px; justify-content:center;
}
.menu-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent); transform:translateX(-100%); transition:transform .5s; }
.menu-btn:hover::before { transform:translateX(100%); }
.menu-btn:hover { transform:translateY(-3px) scale(1.03); }
.menu-btn:active { transform:scale(.97); }
.btn-play { background:linear-gradient(135deg,#7c3aed,#a855f7); color:white; box-shadow:0 4px 20px rgba(124,58,237,.5); }
.btn-shop { background:linear-gradient(135deg,#b45309,#f59e0b); color:white; box-shadow:0 4px 20px rgba(245,158,11,.4); }
.btn-collection { background:linear-gradient(135deg,#1e40af,#3b82f6); color:white; box-shadow:0 4px 20px rgba(59,130,246,.4); }
.btn-deck { background:linear-gradient(135deg,#166534,#22c55e); color:white; box-shadow:0 4px 20px rgba(34,197,94,.4); }
.btn-match { background:linear-gradient(135deg,#991b1b,#ef4444); color:white; box-shadow:0 4px 20px rgba(239,68,68,.5); }
.btn-booster { background:linear-gradient(135deg,#0e7490,#06b6d4); color:white; box-shadow:0 4px 20px rgba(6,182,212,.4); }

/* NAV */
.nav-bar { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:12px 24px; z-index:1000; background:linear-gradient(to bottom,rgba(5,5,16,.95),transparent); backdrop-filter:blur(10px); }
.nav-title { font-family:'Cinzel Decorative',serif; font-size:1rem; color:var(--gold); cursor:pointer; }
.nav-currencies { display:flex; gap:16px; align-items:center; }
.nav-coins { display:flex; align-items:center; gap:6px; font-family:'Orbitron',sans-serif; font-size:.9rem; color:var(--gold2); }
.nav-diamonds { display:flex; align-items:center; gap:6px; font-family:'Orbitron',sans-serif; font-size:.9rem; color:var(--diamond); }
.nav-back { background:var(--glass); border:1px solid var(--border-glass); color:var(--text); padding:8px 16px; border-radius:8px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:.9rem; transition:all .2s; }
.nav-back:hover { background:var(--glass2); }

/* CARDS */
.card { width:120px; height:168px; border-radius:12px; position:relative; cursor:pointer; transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s; flex-shrink:0; }
.card:hover { transform:translateY(-8px) scale(1.05); }
.card-inner { width:100%; height:100%; border-radius:12px; overflow:hidden; position:relative; border:2px solid var(--card-border,rgba(255,255,255,.3)); box-shadow:0 4px 20px var(--card-shadow,rgba(0,0,0,.5)); }
.rarity-common .card-inner { --card-border:rgba(180,180,180,.6); }
.rarity-rare .card-inner { --card-border:rgba(59,130,246,.8); --card-shadow:rgba(59,130,246,.4); }
.rarity-epic .card-inner { --card-border:rgba(168,85,247,.9); --card-shadow:rgba(168,85,247,.5); }
.rarity-legendary .card-inner { --card-border:rgba(240,192,96,1); --card-shadow:rgba(240,192,96,.6); }
.rarity-mythic .card-inner { --card-border:rgba(220,38,38,1); --card-shadow:rgba(220,38,38,.7); }

/* SHOP */
#shop-screen { padding-top:80px; overflow-y:auto; }
.shop-tabs { display:flex; gap:8px; padding:0 24px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
.shop-tab { padding:10px 24px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:var(--glass); cursor:pointer; font-family:'Orbitron',sans-serif; font-size:.75rem; letter-spacing:.1em; transition:all .2s; }
.shop-tab.active,.shop-tab:hover { background:linear-gradient(135deg,var(--purple),var(--purple2)); border-color:var(--purple2); color:white; }
.shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:24px; max-width:1100px; width:100%; }
.pack-card { border-radius:16px; padding:22px; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden; }
.pack-card:hover { transform:translateY(-6px) scale(1.02); }
.pack-name { font-family:'Orbitron',sans-serif; font-size:.95rem; font-weight:700; margin-bottom:8px; }
.pack-price { font-family:'Orbitron',sans-serif; font-size:1.2rem; margin-top:12px; }
.pack-info { font-size:.82rem; color:rgba(255,255,255,.6); line-height:1.6; }

/* SHOP ITEMS */
.shop-item { border-radius:14px; padding:18px; cursor:pointer; transition:all .3s; position:relative; overflow:hidden; }
.shop-item:hover { transform:translateY(-4px); }

/* PACK OPENING */
#opening-screen { background:rgba(0,0,0,.97); }
@keyframes packFloat { 0%,100%{transform:rotateY(-5deg) rotateX(3deg) translateY(0)} 50%{transform:rotateY(5deg) rotateX(-3deg) translateY(-15px)} }
@keyframes packOpen {
  0%{transform:translateY(0) rotateZ(0) scale(1);opacity:1}
  30%{transform:translateY(-30px) rotateZ(-8deg) scale(1.1)}
  60%{transform:translateY(15px) rotateZ(12deg) scale(1.2)}
  80%{transform:translateY(-10px) rotateZ(-5deg) scale(1.4)}
  100%{transform:scale(2) translateY(-100px);opacity:0}
}
.reveal-card { width:140px; height:196px; border-radius:14px; position:relative; transition:all .6s cubic-bezier(.34,1.56,.64,1); cursor:pointer; flex-shrink:0; }

/* COLLECTION */
#collection-screen { padding-top:80px; overflow-y:auto; }
.collection-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(125px,1fr)); gap:14px; padding:20px; max-width:1200px; width:100%; }
.collection-slot { width:125px; height:175px; border-radius:12px; position:relative; opacity:.4; filter:grayscale(100%); transition:all .3s; }
.collection-slot.owned { opacity:1; filter:none; }
.collection-slot.owned:hover { transform:translateY(-6px) scale(1.05); }
.duplicate-badge { position:absolute; top:-6px; right:-6px; background:var(--gold2); color:#000; font-size:.65rem; font-family:'Orbitron',sans-serif; padding:2px 6px; border-radius:20px; font-weight:700; z-index:10; }

/* DECK */
#deck-screen { padding-top:80px; overflow-y:auto; }
.deck-layout { display:flex; gap:24px; padding:24px; max-width:1200px; width:100%; }
.deck-left { flex:1; min-width:300px; }
.deck-right { width:280px; flex-shrink:0; }
.deck-slot { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:10px; margin-bottom:6px; cursor:pointer; transition:all .2s; }
.deck-slot:hover { background:var(--glass2); }

/* MATCH */
#match-screen { background:linear-gradient(180deg,#050520,#1a0040 50%,#050520); }
.match-field { width:100%; max-width:900px; display:flex; flex-direction:column; align-items:center; gap:14px; padding:14px 20px; height:100vh; justify-content:space-between; }
.health-bar-bg { height:18px; border-radius:9px; background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.15); overflow:hidden; }
.health-bar-fill { height:100%; border-radius:9px; transition:width .5s ease; }
.hp-player .health-bar-fill { background:linear-gradient(90deg,#16a34a,#4ade80); }
.hp-enemy .health-bar-fill { background:linear-gradient(90deg,#dc2626,#f87171); }
.match-area { display:flex; gap:40px; align-items:center; justify-content:center; width:100%; padding:10px 0; }
.card-slot { width:160px; height:224px; border-radius:14px; border:2px dashed rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; position:relative; transition:all .3s; }
.card-slot.has-card { border-style:solid; }
.vs-text { font-family:'Cinzel Decorative',serif; font-size:2.2rem; color:var(--gold); text-shadow:0 0 20px var(--gold); animation:vsPulse 1.5s ease-in-out infinite; }
@keyframes vsPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.hand-row { display:flex; gap:10px; overflow-x:auto; padding:6px 4px; max-width:100%; justify-content:center; scrollbar-width:thin; }
.match-log { font-size:.82rem; color:rgba(255,255,255,.75); text-align:center; font-family:'Rajdhani',sans-serif; min-height:38px; animation:logFade .3s; padding:10px 20px; }
@keyframes logFade { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
.hand-card { width:90px; height:126px; border-radius:10px; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); flex-shrink:0; position:relative; }
.hand-card:hover { transform:translateY(-14px) scale(1.1); }
.hand-card.selected { transform:translateY(-20px) scale(1.12); box-shadow:0 0 24px var(--gold2),0 0 40px rgba(255,215,0,.3); }
.battle-btn { padding:12px 32px; font-family:'Orbitron',sans-serif; font-size:.85rem; font-weight:700; letter-spacing:.1em; cursor:pointer; border:none; border-radius:10px; transition:all .3s cubic-bezier(.34,1.56,.64,1); }
.battle-btn:hover { transform:scale(1.06); }
.battle-btn:active { transform:scale(.95); }

/* FILTER TABS */
.filter-tabs { display:flex; gap:6px; flex-wrap:wrap; padding:0 20px; }
.tab-btn { padding:7px 16px; border-radius:20px; border:1px solid rgba(255,255,255,.2); background:var(--glass); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:.88rem; cursor:pointer; transition:all .2s; }
.tab-btn.active,.tab-btn:hover { background:linear-gradient(135deg,var(--purple),var(--purple2)); border-color:var(--purple2); color:white; }

/* DECK STATS */
.deck-stats { display:flex; gap:12px; margin-bottom:14px; }
.stat-box { flex:1; padding:10px; border-radius:10px; text-align:center; }
.stat-val { font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:700; }
.stat-label { font-size:.7rem; opacity:.6; margin-top:2px; }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:rgba(255,255,255,.03); }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:3px; }

/* NOTIFICATIONS */
.notif { position:fixed; top:90px; right:20px; padding:12px 20px; border-radius:12px; font-family:'Orbitron',sans-serif; font-size:.82rem; z-index:9999; animation:notifIn .4s cubic-bezier(.34,1.56,.64,1),notifOut .3s ease 2.5s forwards; pointer-events:none; }
@keyframes notifIn { from{transform:translateX(120%);opacity:0} to{transform:none;opacity:1} }
@keyframes notifOut { from{opacity:1} to{opacity:0;transform:translateX(60px)} }
.notif-gold { background:linear-gradient(135deg,#b45309,#f59e0b); color:white; box-shadow:0 4px 20px rgba(245,158,11,.4); }
.notif-purple { background:linear-gradient(135deg,#7c3aed,#a855f7); color:white; box-shadow:0 4px 20px rgba(124,58,237,.4); }
.notif-red { background:linear-gradient(135deg,#991b1b,#ef4444); color:white; }
.notif-cyan { background:linear-gradient(135deg,#0e7490,#06b6d4); color:white; }

/* RESULT OVERLAY */
.result-overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.85); backdrop-filter:blur(12px); z-index:5000; flex-direction:column; gap:20px; }
.result-title { font-family:'Cinzel Decorative',serif; font-size:clamp(2.5rem,8vw,4.5rem); animation:resultPop .6s cubic-bezier(.34,1.56,.64,1); }
@keyframes resultPop { from{transform:scale(0) rotate(-10deg);opacity:0} to{transform:scale(1);opacity:1} }
.result-win { color:var(--gold2); text-shadow:0 0 40px var(--gold2),0 0 80px rgba(255,215,0,.4); }
.result-lose { color:#ef4444; text-shadow:0 0 40px #ef4444; }

/* BATTLE ANIMATIONS */
@keyframes cardReveal { 0%{transform:rotateY(180deg) scale(.5);opacity:0} 60%{transform:rotateY(-10deg) scale(1.1)} 100%{transform:rotateY(0) scale(1);opacity:1} }
@keyframes puffOut { 0%{transform:scale(1) rotate(0);opacity:1} 50%{transform:scale(1.5) rotate(15deg);filter:brightness(3) saturate(3)} 100%{transform:scale(0) rotate(-30deg);opacity:0} }
@keyframes fadeInUp { from{transform:translateY(20px);opacity:0} to{transform:none;opacity:1} }
@keyframes coinFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx,0px),var(--ty,-60px)) scale(0);opacity:0} }
@keyframes damageShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
@keyframes winPulse { 0%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.08);filter:brightness(1.5) saturate(2)} 100%{transform:scale(1);filter:brightness(1)} }
@keyframes loseCrack {
  0%{transform:scale(1);filter:none}
  20%{transform:scale(1.05);filter:brightness(2) saturate(0)}
  40%{transform:scale(.98) skewX(-5deg);filter:brightness(.5) hue-rotate(0deg)}
  60%{transform:scale(1.02) skewX(3deg);filter:brightness(.3) saturate(0)}
  80%{transform:scale(.95) translateY(5px);filter:brightness(.2) saturate(0) blur(1px)}
  100%{transform:scale(.9) translateY(10px) rotate(-3deg);filter:brightness(.1) saturate(0) blur(2px);opacity:.4}
}
@keyframes winGlow { 0%,100%{box-shadow:0 0 10px rgba(74,222,128,.5)} 50%{box-shadow:0 0 40px rgba(74,222,128,1),0 0 80px rgba(74,222,128,.5)} }
@keyframes battleSlam { 0%{transform:scale(1)} 30%{transform:scale(1.2)} 100%{transform:scale(1)} }
@keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
@keyframes slideIn { from{transform:translateX(-30px);opacity:0} to{transform:none;opacity:1} }
@keyframes hpFlash { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes damageNum { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-60px) scale(.7);opacity:0} }
@keyframes powerupActivate { 0%{transform:scale(1)} 50%{transform:scale(1.3);filter:brightness(2)} 100%{transform:scale(1)} }

/* COIN PARTICLES */
.coin-particle { position:absolute; width:12px; height:12px; border-radius:50%; background:var(--gold2); animation:coinFly var(--d,.8s) ease-out forwards; pointer-events:none; }

/* TUTORIAL OVERLAY */
.tutorial-overlay { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:8000; display:flex; align-items:center; justify-content:center; }
.tutorial-box { max-width:600px; padding:40px; text-align:center; }
.tutorial-step { display:none; }
.tutorial-step.active { display:block; animation:fadeInUp .4s; }
.tutorial-icon { font-size:3.5rem; margin-bottom:16px; }
.tutorial-title { font-family:'Cinzel Decorative',serif; font-size:1.6rem; color:var(--gold); margin-bottom:12px; }
.tutorial-text { font-size:1rem; opacity:.85; line-height:1.7; margin-bottom:24px; }
.tut-btn { padding:12px 32px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--purple),var(--purple2)); color:white; font-family:'Orbitron',sans-serif; font-size:.85rem; cursor:pointer; transition:all .2s; }
.tut-btn:hover { transform:scale(1.05); }
.tut-dots { display:flex; gap:8px; justify-content:center; margin-bottom:20px; }
.tut-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.2); transition:all .3s; }
.tut-dot.active { background:var(--gold2); transform:scale(1.3); }

/* POWERUP PANEL */
.powerup-panel { display:flex; gap:8px; }
.powerup-btn { padding:8px 14px; border:1px solid; border-radius:8px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:.65rem; transition:all .2s; background:rgba(0,0,0,.3); }
.powerup-btn:hover:not(:disabled) { transform:scale(1.05); }
.powerup-btn:disabled { opacity:.35; cursor:not-allowed; }

/* MATCH SETUP */
.setup-panel { max-width:500px; width:90%; padding:36px; text-align:center; }

/* TURN INDICATOR */
.turn-badge { font-family:'Orbitron',sans-serif; font-size:.7rem; letter-spacing:.15em; padding:5px 14px; border-radius:20px; }
.turn-player { background:linear-gradient(90deg,rgba(22,163,74,.3),rgba(74,222,128,.2)); border:1px solid rgba(74,222,128,.4); color:#4ade80; }
.turn-enemy { background:linear-gradient(90deg,rgba(220,38,38,.3),rgba(248,113,113,.2)); border:1px solid rgba(248,113,113,.4); color:#f87171; }

/* MENU CURRENCY DISPLAY */

  { id:'starter',  name:'Bustina Starter',      price:50,  cards:5,  desc:'5 carte · solo Comuni e Rari',         rarityBonus:{common:60,rare:35,epic:5,legendary:0,mythic:0},   color:'#1e40af', color2:'#3b82f6' },
  { id:'advanced', name:'Bustina Avanzata',     price:150, cards:7,  desc:'7 carte · buone chance Epiche',        rarityBonus:{common:40,rare:35,epic:20,legendary:4,mythic:1},  color:'#7c3aed', color2:'#a855f7' },

  { id:'legend',   name:'Bustina Leggendaria',  price:800, cards:10, desc:' carte · alta chance Leggendaria',   rarityBonus:{common:10,rare:20,epic:35,legendary:28,mythic:7}, color:'#991b1b', color2:'#ef4444' },

];

// ============================================================
// BUILD 200 UNIQUE CARDS
// ============================================================
const RARITY_MAP = [
  ...Array(60).fill('common'),
  ...Array(40).fill('rare'),
  ...Array(60).fill('epic'),
  ...Array(30).fill('legendary'),
  ...Array(10).fill('mythic'),
];
const ELEMENT_LIST = ['fire','water','earth','lightning','nature','ice','dark','light','air','cosmic'];
const BASE_STATS = {
  common:    { atk:[70,130],  def:[55,165] },
  rare:      { atk:[130,185], def:[85,205] },
  epic:      { atk:[175,275], def:[120,285] },
  legendary: { atk:[260,420], def:[160,410] },
  mythic:    { atk:[520,660], def:[340,510] },
};

function seededRandom(seed) {
  let s = seed; return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

const ALL_CARDS = UNIQUE_NAMES.map((name, idx) => {
  const rarity = RARITY_MAP[idx];
  const element = ELEMENT_LIST[idx % ELEMENT_LIST.length];
  const r = seededRandom(idx * 137 + 31);
  const bs = BASE_STATS[rarity];
  const attack  = Math.floor(bs.atk[0] + r() * (bs.atk[1] - bs.atk[0]));
  const defense = Math.floor(bs.def[0] + r() * (bs.def[1] - bs.def[0]));
  return { id: idx, name, rarity, element, attack, defense };
});

// ============================================================
// GAME STATE
// ============================================================
let STATE = {
  coins: 500,
  diamonds: 10,
  collection: {},
  deck: [],
  currentPack: null,
  powerups: { dmg_boost:0, def_shield:0, heal_potion:0, instant_dmg:0, double_draw:0 },
  tutorialDone: false,
  totalMatches: 0,
};

// ============================================================
// SVG GENERATORS
// ============================================================
const ELEMENT_COLORS = {
  fire:['#ff4500','#ff8c00','#ffd700'], water:['#006994','#00bfff','#e0f7ff'],
  earth:['#4a2c2a','#8b6914','#c8a85a'], lightning:['#1a1a3e','#7b68ee','#ffff00'],
  nature:['#1a3a1a','#228b22','#90ee90'], ice:['#b0e0e6','#87ceeb','#ffffff'],
  dark:['#1a1a1a','#4b0082','#8a2be2'], light:['#fff7d6','#ffd700','#ffffff'],
  air:['#e0f0ff','#87cefa','#f0f8ff'], cosmic:['#0d0d2b','#4b0082','#e040fb'],
};
const RARITY_BG = {
  common:['#1a1f2e','#2d3548'], rare:['#0f1b3d','#1e3a8a'],
  epic:['#1a0040','#4c1d95'], legendary:['#2d1500','#7c3a00'], mythic:['#2d0000','#7f1d1d'],
};
const ELEMENT_ICON = {fire:'▲',water:'~',earth:'◆',lightning:'↯',nature:'✿',ice:'❄',dark:'☽',light:'☀',air:'≈',cosmic:'★'};

function elementArt(el, ec, w, h) {
  const cx=w/2, art_top=h*.13, art_h=h*.48, cy=art_top+art_h*.42;
  switch(el) {
    case 'fire': return `<ellipse cx="${cx}" cy="${art_top+art_h*.8}" rx="${w*.3}" ry="${art_h*.15}" fill="${ec[0]}66"/><path d="M${cx},${art_top} C${cx-w*.15},${art_top+art_h*.3} ${cx+w*.2},${art_top+art_h*.2} ${cx},${art_top+art_h*.5} C${cx-w*.25},${art_top+art_h*.3} ${cx-w*.1},${art_top+art_h*.6} ${cx},${art_top+art_h}" fill="${ec[1]}cc"/><ellipse cx="${cx}" cy="${art_top+art_h*.5}" rx="${w*.1}" ry="${art_h*.16}" fill="${ec[2]}66"/>`;
    case 'water': return `<ellipse cx="${cx}" cy="${cy}" rx="${w*.28}" ry="${art_h*.32}" fill="${ec[1]}44"/><path d="M${cx-w*.25},${cy} Q${cx},${art_top+art_h*.15} ${cx+w*.25},${cy} Q${cx},${art_top+art_h*.85} ${cx-w*.25},${cy}Z" fill="${ec[1]}99"/><circle cx="${cx}" cy="${cy}" r="${w*.08}" fill="${ec[2]}aa"/>`;
    case 'earth': return `<rect x="${cx-w*.25}" y="${art_top+art_h*.4}" width="${w*.5}" height="${art_h*.45}" rx="4" fill="${ec[1]}88"/><polygon points="${cx},${art_top+art_h*.1} ${cx+w*.25},${art_top+art_h*.42} ${cx-w*.25},${art_top+art_h*.42}" fill="${ec[1]}bb"/>`;
    case 'lightning': return `<polygon points="${cx+w*.05},${art_top} ${cx-w*.1},${art_top+art_h*.45} ${cx+w*.05},${art_top+art_h*.45} ${cx-w*.05},${art_top+art_h}" fill="${ec[1]}dd"/><line x1="${cx-w*.2}" y1="${art_top+art_h*.3}" x2="${cx+w*.2}" y2="${art_top+art_h*.3}" stroke="${ec[2]}" stroke-width="1" stroke-opacity=".5"/>`;
    case 'nature': return `<circle cx="${cx}" cy="${cy}" r="${w*.22}" fill="${ec[1]}66"/><line x1="${cx}" y1="${art_top+art_h*.85}" x2="${cx}" y2="${art_top+art_h*.3}" stroke="${ec[0]}" stroke-width="3"/><ellipse cx="${cx-w*.12}" cy="${art_top+art_h*.4}" rx="${w*.14}" ry="${art_h*.12}" fill="${ec[1]}aa" transform="rotate(-30,${cx-w*.12},${art_top+art_h*.4})"/><ellipse cx="${cx+w*.12}" cy="${art_top+art_h*.35}" rx="${w*.14}" ry="${art_h*.12}" fill="${ec[2]}99" transform="rotate(30,${cx+w*.12},${art_top+art_h*.35})"/>`;
    case 'ice': return `<polygon points="${cx},${art_top} ${cx+w*.04},${art_top+art_h*.45} ${cx+w*.25},${art_top+art_h*.22} ${cx+w*.18},${art_top+art_h*.55} ${cx+w*.28},${art_top+art_h*.55} ${cx},${art_top+art_h*.85} ${cx-w*.28},${art_top+art_h*.55} ${cx-w*.18},${art_top+art_h*.55} ${cx-w*.25},${art_top+art_h*.22} ${cx-w*.04},${art_top+art_h*.45}" fill="${ec[1]}77" stroke="${ec[2]}" stroke-width="1"/><circle cx="${cx}" cy="${cy}" r="${w*.07}" fill="${ec[2]}aa"/>`;
    case 'dark': return `<circle cx="${cx}" cy="${cy}" r="${w*.22}" fill="${ec[1]}77"/><path d="M${cx-w*.15},${art_top+art_h*.2} Q${cx},${art_top+art_h*.1} ${cx+w*.15},${art_top+art_h*.2} L${cx+w*.08},${art_top+art_h*.65} L${cx},${art_top+art_h*.55} L${cx-w*.08},${art_top+art_h*.65}Z" fill="${ec[2]}99"/><circle cx="${cx-w*.07}" cy="${cy-.02*h}" r="${w*.03}" fill="${ec[2]}"/><circle cx="${cx+w*.07}" cy="${cy-.02*h}" r="${w*.03}" fill="${ec[2]}"/>`;
    case 'light': return `<circle cx="${cx}" cy="${cy}" r="${w*.18}" fill="${ec[1]}99"/>${Array.from({length:8},(_,i)=>{const a=i*45*Math.PI/180;return `<line x1="${cx+Math.cos(a)*w*.2}" y1="${cy+Math.sin(a)*w*.2}" x2="${cx+Math.cos(a)*w*.32}" y2="${cy+Math.sin(a)*w*.32}" stroke="${ec[2]}" stroke-width="2" stroke-opacity=".9"/>`}).join('')}<circle cx="${cx}" cy="${cy}" r="${w*.1}" fill="${ec[2]}"/>`;
    case 'air': return `${Array.from({length:4},(_,i)=>`<path d="M${cx-w*.28},${art_top+art_h*(.25+i*.15)} Q${cx},${art_top+art_h*(.15+i*.15)} ${cx+w*.28},${art_top+art_h*(.25+i*.15)}" fill="none" stroke="${ec[1]}" stroke-width="2" stroke-opacity="${.9-i*.18}"/>`).join('')}<circle cx="${cx}" cy="${cy}" r="${w*.12}" fill="${ec[1]}55" stroke="${ec[2]}" stroke-width="1"/>`;
    case 'cosmic': return `<circle cx="${cx}" cy="${cy}" r="${w*.25}" fill="${ec[0]}44"/>${Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;const r=w*.18+((i*71)%1)*w*.1;return `<circle cx="${cx+Math.cos(a)*r}" cy="${cy+Math.sin(a)*r}" r="${1+(i%3)}" fill="${ec[2]}" opacity=".7"/>`}).join('')}<circle cx="${cx}" cy="${cy}" r="${w*.1}" fill="${ec[1]}cc"/><circle cx="${cx}" cy="${cy}" r="${w*.05}" fill="${ec[2]}"/>`;
    default: return `<circle cx="${cx}" cy="${cy}" r="${w*.2}" fill="${ec[1]}88"/>`;
  }
}

function rarStars(rar, w, h) {
  const n={common:1,rare:2,epic:3,legendary:4,mythic:5}[rar]||1;
  const color=RARITIES[rar].color;
  const sx=w/2-(n*10)/2;
  return Array.from({length:n},(_,i)=>`<text x="${sx+i*10}" y="${h*.965}" fill="${color}" font-size="7" opacity=".9">★</text>`).join('');
}

function cardSVG(card, w=120, h=168) {
  const el=card.element||'fire', rar=card.rarity||'common';
  const ec=ELEMENT_COLORS[el]||ELEMENT_COLORS.fire, rb=RARITY_BG[rar]||RARITY_BG.common;
  const rc=RARITIES[rar], isLarge=w>120;
  const art=elementArt(el,ec,w,h);
  const shimmer=(rar==='legendary'||rar==='mythic')?`<rect x="0" y="0" width="${w*.3}" height="${h}" fill="rgba(255,255,255,.07)" transform="skewX(-15)"/>`:'';
  const stars=rarStars(rar,w,h);
  const uid=`c${card.id}_${w}`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
  <defs>
    <linearGradient id="bg_${uid}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${rb[0]}"/><stop offset="100%" stop-color="${rb[1]}"/></linearGradient>
    <radialGradient id="glow_${uid}" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="${ec[1]}" stop-opacity=".5"/><stop offset="100%" stop-color="${ec[0]}" stop-opacity="0"/></radialGradient>
    <clipPath id="clip_${uid}"><rect width="${w}" height="${h}" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#clip_${uid})">
    <rect width="${w}" height="${h}" fill="url(#bg_${uid})"/>
    <rect width="${w}" height="${h}" fill="url(#glow_${uid})"/>
    <rect y="${h*.12}" width="${w}" height="${h*.5}" rx="4" fill="${ec[0]}22"/>
    ${art}${shimmer}
    <rect width="${w}" height="${h*.15}" fill="${ec[0]}44"/>
    <rect y="${h*.64}" width="${w}" height="${h*.36}" rx="4" fill="rgba(0,0,0,.6)"/>
    <rect y="${h*.64}" width="${w}" height="3" fill="${rc.color}"/>
    <text x="${w/2}" y="${h*.72}" text-anchor="middle" fill="white" font-family="Cinzel Decorative,serif" font-size="${isLarge?9:6}" font-weight="700">${card.name}</text>
    <text x="${w/2}" y="${h*.79}" text-anchor="middle" fill="${rc.color}" font-family="Orbitron,monospace" font-size="${isLarge?7:5}" font-weight="700">${rc.name.toUpperCase()}</text>
    <rect x="4" y="${h*.83}" width="${(w-12)/2}" height="${h*.09}" rx="4" fill="rgba(220,38,38,.3)" stroke="rgba(239,68,68,.5)" stroke-width="1"/>
    <text x="${(w-12)/4+4}" y="${h*.895}" text-anchor="middle" fill="#f87171" font-family="Orbitron,monospace" font-size="${isLarge?8:5.5}" font-weight="700">ATK ${card.attack}</text>
    <rect x="${(w-12)/2+8}" y="${h*.83}" width="${(w-12)/2}" height="${h*.09}" rx="4" fill="rgba(37,99,235,.3)" stroke="rgba(59,130,246,.5)" stroke-width="1"/>
    <text x="${(w-12)*3/4+8}" y="${h*.895}" text-anchor="middle" fill="#93c5fd" font-family="Orbitron,monospace" font-size="${isLarge?8:5.5}" font-weight="700">DEF ${card.defense}</text>
    ${stars}
    <circle cx="${w-10}" cy="12" r="8" fill="${ec[1]}44" stroke="${ec[1]}" stroke-width="1"/>
    <text x="${w-10}" y="16" text-anchor="middle" fill="${ec[1]}" font-size="7" font-family="monospace">${ELEMENT_ICON[el]||'●'}</text>
    <rect width="${w}" height="${h}" rx="10" fill="none" stroke="${rc.color}" stroke-width="1.5" stroke-opacity=".8"/>
  </g></svg>`;
}

function cardBackSVG(w=120, h=168) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
  <defs><linearGradient id="backG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a0050"/><stop offset="100%" stop-color="#050530"/></linearGradient><clipPath id="backC"><rect width="${w}" height="${h}" rx="10"/></clipPath></defs>
  <g clip-path="url(#backC)"><rect width="${w}" height="${h}" fill="url(#backG)"/>
  ${Array.from({length:8},(_,i)=>Array.from({length:12},(_,j)=>`<rect x="${i*16}" y="${j*15}" width="14" height="13" rx="2" fill="rgba(255,255,255,.03)"/>`).join('')).join('')}
  <circle cx="${w/2}" cy="${h/2}" r="${w*.3}" fill="none" stroke="rgba(168,85,247,.3)" stroke-width="2"/>
  <circle cx="${w/2}" cy="${h/2}" r="${w*.2}" fill="none" stroke="rgba(240,192,96,.4)" stroke-width="1.5"/>
  <text x="${w/2}" y="${h/2+8}" text-anchor="middle" fill="rgba(240,192,96,.8)" font-family="Cinzel Decorative,serif" font-size="11" font-weight="700">AC</text>
  <rect width="${w}" height="${h}" rx="10" fill="none" stroke="rgba(168,85,247,.5)" stroke-width="1.5"/></g></svg>`;
}

function packSVG(pack, w=200, h=280) {
  const c1=pack.color, c2=pack.color2;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
  <defs>
    <linearGradient id="pg_${pack.id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>
    <linearGradient id="pg2_${pack.id}" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="rgba(255,255,255,.2)"/><stop offset="50%" stop-color="rgba(255,255,255,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.3)"/></linearGradient>
    <clipPath id="pc_${pack.id}"><rect width="${w}" height="${h}" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#pc_${pack.id})">
    <rect width="${w}" height="${h}" fill="url(#pg_${pack.id})"/>
    <rect width="${w}" height="${h}" fill="url(#pg2_${pack.id})"/>
    ${Array.from({length:5},(_,i)=>`<line x1="${-20+i*60}" y1="0" x2="${20+i*60}" y2="${h}" stroke="rgba(255,255,255,.08)" stroke-width="20"/>`).join('')}
    <line x1="0" y1="${h*.22}" x2="${w}" y2="${h*.22}" stroke="rgba(255,255,255,.4)" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="${w/2}" cy="${h*.13}" r="${w*.12}" fill="rgba(255,255,255,.15)"/>

function buyCoinPack(id) {
  const cp=COIN_PACKS.find(c=>c.id===id);

  updateDiamonds(-cp.diamonds); updateCoins(cp.coins);
  notify(`+${cp.coins} Monete! 💰`,'gold');
  renderShop('coins');
}
function buyPowerup(id) {
  const pu=POWERUPS_DEFS.find(p=>p.id===id);
  if(!pu) return;
  if((STATE.powerups[id]||0)>=pu.max){notify('Già al massimo!','purple');return;}
  if(pu.price_coins){
    if(STATE.coins<pu.price_coins){notify('Monete insufficienti!','purple');return;}
    updateCoins(-pu.price_coins);
  } else {
    if(STATE.diamonds<pu.price_d){notify('Diamanti insufficienti!','purple');return;}
    updateDiamonds(-pu.price_d);
  }
  STATE.powerups[id]=(STATE.powerups[id]||0)+1;
  notify(`${pu.icon} ${pu.name} acquistato!`,'gold');
  renderShop('powerups');
}

function rollRarity(bonuses) {
  const total=Object.values(bonuses).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const [rar,w] of Object.entries(bonuses)){r-=w;if(r<=0)return rar;}
  return 'common';
}
function generatePackCards(pack) {
  const cards=[];
  for(let i=0;i<pack.cards;i++){
    const rar=rollRarity(pack.rarityBonus);
    const pool=ALL_CARDS.filter(c=>c.rarity===rar);
    cards.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  return cards;
}

  </svg>`;
}

function animatePackOpen() {
  const packEl=document.getElementById('packSvgEl');
  const wrapper=document.getElementById('packWrapper');
  wrapper.style.pointerEvents='none';
  packEl.style.animation='packOpen .9s cubic-bezier(.34,1.56,.64,1) forwards';
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;background:white;z-index:9999;opacity:0;pointer-events:none;transition:opacity .15s';
  document.body.appendChild(flash);
  setTimeout(()=>flash.style.opacity='.9',700);
  setTimeout(()=>{
    flash.style.opacity='0';
    setTimeout(()=>flash.remove(),200);
    document.getElementById('packOpenPhase').style.display='none';
    const rev=document.getElementById('revealPhase'); rev.style.display='flex';
    revealCards(generatePackCards(STATE.currentPack));
  },850);

function revealCards(cards) {
  const grid=document.getElementById('revealGrid'); grid.innerHTML='';
  cards.forEach((card,idx)=>{
    setTimeout(()=>{
      const isDup=(STATE.collection[card.id]||0)>0;
      STATE.collection[card.id]=(STATE.collection[card.id]||0)+1;
      const wrapper=document.createElement('div');
      wrapper.style.cssText='position:relative;animation:cardReveal .5s cubic-bezier(.34,1.56,.64,1) forwards';
      const rarInfo=RARITIES[card.rarity];
      if(isDup){
        const coinReward=rarInfo.coinValue;
        wrapper.innerHTML=`
          <div style="position:relative;width:130px;height:182px;border-radius:14px;overflow:hidden;box-shadow:0 0 20px ${rarInfo.glow}">
            ${cardSVG(card,130,182)}
            <div class="duplicate-badge">×${STATE.collection[card.id]}</div>
          </div>
          <div style="text-align:center;margin-top:5px;font-size:.72rem;color:var(--gold2);font-family:'Orbitron',sans-serif">+${coinReward} ⬡</div>`;
        grid.appendChild(wrapper);
        setTimeout(()=>dupAnimation(wrapper,card,coinReward),900);
        updateCoins(coinReward);
      } else {
        wrapper.innerHTML=`
          <div style="position:relative;width:130px;height:182px;border-radius:14px;overflow:hidden;box-shadow:0 0 25px ${rarInfo.glow}">
            ${cardSVG(card,130,182)}
          </div>
          <div style="text-align:center;margin-top:5px;font-size:.72rem;color:${rarInfo.color};font-family:'Orbitron',sans-serif">${rarInfo.name.toUpperCase()}</div>`;
        grid.appendChild(wrapper);
        if(card.rarity==='legendary'||card.rarity==='mythic') setTimeout(()=>legendaryEffect(wrapper,card),300);
      }
    },idx*280);
  });
}

function dupAnimation(wrapper,card,coins){
  const el=wrapper.querySelector('div');
  if(el) el.style.animation='puffOut .6s cubic-bezier(.34,1.56,.64,1) forwards';
  const rect=wrapper.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<8;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:12px;height:12px;border-radius:50%;background:var(--gold2);z-index:9998;--tx:${(Math.random()-.5)*110}px;--ty:${-(40+Math.random()*80)}px;--d:${.5+Math.random()*.5}s;animation:coinFly var(--d) ${i*.05}s ease-out forwards;pointer-events:none;transform:translate(-50%,-50%)`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),1000);
  }
}

function legendaryEffect(wrapper,card){
  const rarInfo=RARITIES[card.rarity];
  for(let p=0;p<3;p++){
    setTimeout(()=>{
      const pulse=document.createElement('div');
      pulse.style.cssText=`position:absolute;inset:-8px;border-radius:16px;border:2px solid ${rarInfo.color};animation:legendPulse .7s ease-out forwards;pointer-events:none`;
      wrapper.style.position='relative'; wrapper.appendChild(pulse);
      setTimeout(()=>pulse.remove(),700);
    },p*250);
  }
  if(!document.getElementById('legendKF')){
    const st=document.createElement('style'); st.id='legendKF';
    st.textContent='@keyframes legendPulse{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.4)}}';
    document.head.appendChild(st);
  }
}

let MATCH={};

function startMatch(){
  // Use ALL deck cards (no random shuffle cutting — player uses their full deck)
  const playerDeckIds=[...STATE.deck];
  // Bot uses balanced pool scaled to player's deck strength
  const avgAtk=playerDeckIds.reduce((s,id)=>{const c=ALL_CARDS.find(x=>x.id===id);return s+(c?c.attack:100)},0)/playerDeckIds.length;
  const botPool=ALL_CARDS.filter(c=>{
    if(c.rarity==='mythic') return false;
    const bsAtk={common:100,rare:155,epic:225,legendary:340}[c.rarity]||100;
    return Math.abs(bsAtk-avgAtk)<120; // Limit bot to fair cards
  });
  const botDeck=Array.from({length:Math.max(playerDeckIds.length,8)},()=>botPool[Math.floor(Math.random()*botPool.length)].id);

  MATCH={
    playerDeck:[...playerDeckIds],
    botDeck:[...botDeck],
    playerHand:[],
    botHand:[],
    playerHP:20, botHP:20,
    playerField:null, botField:null,
    log:'Il match inizia! Seleziona una carta dalla tua mano.',
    selectedCard:null,
    phase:'choose',
    round:0,
    activePowerups:{},
    powerupsUsed:{},
  };
  for(let i=0;i<Math.min(5,MATCH.playerDeck.length);i++) MATCH.playerHand.push(MATCH.playerDeck.shift());
  for(let i=0;i<Math.min(5,MATCH.botDeck.length);i++) MATCH.botHand.push(MATCH.botDeck.shift());
  renderMatch();
}

function renderMatch(){
  const s=document.getElementById('match-screen');
  const m=MATCH;
  const pPct=Math.max(0,(m.playerHP/20)*100);
  const bPct=Math.max(0,(m.botHP/20)*100);

  // Build powerup buttons
  const puBtns=POWERUPS_DEFS.map(pu=>{
    const count=STATE.powerups[pu.id]||0;
    const used=m.powerupsUsed[pu.id]||false;
    const disabled=count<=0||used||m.phase!=='choose';
    return `<button class="powerup-btn" title="${pu.desc}" ${disabled?'disabled':''} onclick="usePowerup('${pu.id}')" style="border-color:${pu.color2}88;color:${pu.color2}">
      ${pu.icon} <span style="color:rgba(255,255,255,.5)">×${count}</span>
    </button>`;
  }).join('');

  s.innerHTML=`
    <div class="nav-bar">
      <button class="nav-back" onclick="if(confirm('Abbandona il match?')){endMatchAbort()}">← Esci</button>
      <div class="nav-title">AETHER CARDS</div>
      ${coinDisplay()}
    </div>
    <div class="match-field">
      <!-- BOT HP -->
      <div style="width:100%;max-width:500px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-family:'Orbitron',sans-serif;font-size:.75rem">
          <span style="color:#f87171">🤖 BOT</span>
          <span style="color:#f87171" id="botHPNum">${m.botHP}/20</span>
        </div>
        <div class="health-bar-bg hp-enemy" style="max-width:500px">
          <div class="health-bar-fill" id="botHPBar" style="width:${bPct}%;background:linear-gradient(90deg,#dc2626,#f87171)"></div>
        </div>
      </div>

      <!-- BATTLE AREA -->
      <div class="match-area">
        <div class="card-slot ${m.botField?'has-card':''}" id="botFieldSlot" style="${m.botField?'border-color:rgba(239,68,68,.6)':''}">
          ${m.botField?`<div id="botCardAnim" style="width:160px;height:224px;border-radius:14px;overflow:hidden">${cardSVG(ALL_CARDS.find(c=>c.id===m.botField),160,224)}</div>`:`<span style="opacity:.25;font-size:.75rem;font-family:'Rajdhani',sans-serif;text-align:center">Carta<br>Bot</span>`}
        </div>
        <div style="text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center">
          <div class="vs-text">VS</div>
          <div style="font-family:'Orbitron',sans-serif;font-size:.65rem;opacity:.4">Round ${m.round}</div>
          ${m.phase==='battle'?`<button class="battle-btn" onclick="executeBattle()" style="background:linear-gradient(135deg,#991b1b,#ef4444);color:white;margin-top:4px;font-size:.75rem;padding:10px 20px">⚔️ COMBATTI!</button>`:''}
        </div>
        <div class="card-slot ${m.playerField?'has-card':''}" id="playerFieldSlot" style="${m.playerField?'border-color:rgba(74,222,128,.6)':''}">
          ${m.playerField?`<div id="playerCardAnim" style="width:160px;height:224px;border-radius:14px;overflow:hidden">${cardSVG(ALL_CARDS.find(c=>c.id===m.playerField),160,224)}</div>`:`<span style="opacity:.25;font-size:.75rem;font-family:'Rajdhani',sans-serif;text-align:center">Tua<br>carta</span>`}
        </div>
      </div>

      <!-- PLAYER HP -->
      <div style="width:100%;max-width:500px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-family:'Orbitron',sans-serif;font-size:.75rem">
          <span style="color:#4ade80">👤 TU</span>
          <span style="color:#4ade80" id="playerHPNum">${m.playerHP}/20</span>
        </div>
        <div class="health-bar-bg hp-player" style="max-width:500px">
          <div class="health-bar-fill" id="playerHPBar" style="width:${pPct}%"></div>
        </div>

      <!-- LOG -->
      <div class="match-log glass-panel" id="matchLog">${m.log}</div>

        <div class="powerup-panel">${puBtns}</div>
      </div>

      <div style="font-family:'Orbitron',sans-serif;font-size:.65rem;opacity:.4;margin-bottom:-4px">MANO (${m.playerHand.length} carte) ${m.playerDeck.length>0?`• Mazzo: ${m.playerDeck.length}`:'• Mazzo esaurito'}</div>
      <div class="hand-row" id="handRow">
        ${m.playerHand.map(id=>{
          const card=ALL_CARDS.find(c=>c.id===id); if(!card) return '';
          const isSel=m.selectedCard===id;
          return `<div class="hand-card ${isSel?'selected':''}" onclick="selectHandCard(${id})" title="${card.name}">
            <div style="width:100%;height:100%;border-radius:10px;overflow:hidden;${isSel?`box-shadow:0 0 20px var(--gold2)`:''}">${cardSVG(card,90,126)}</div>
          </div>`;
        }).join('')}
        ${m.playerHand.length===0?`<div style="opacity:.4;font-size:.8rem;padding:16px">Mano vuota!</div>`:''}
      </div>

      <!-- PLAY CARD BTN -->
      <div style="display:flex;gap:10px;margin-top:-4px">
        ${m.phase==='choose'&&m.selectedCard?`
          <button class="battle-btn" onclick="playCard()" style="background:linear-gradient(135deg,#16a34a,#22c55e);color:white;padding:10px 28px;font-size:.8rem">
            ▶ Gioca Carta
          </button>
        `:''}
      </div>

  `;

function selectHandCard(id){
  if(MATCH.phase!=='choose') return;
  MATCH.selectedCard=MATCH.selectedCard===id?null:id;
  renderMatch();
}

function usePowerup(id){
  const pu=POWERUPS_DEFS.find(p=>p.id===id);
  if(!pu||!STATE.powerups[id]||MATCH.phase!=='choose') return;
  STATE.powerups[id]--;
  MATCH.powerupsUsed[id]=true;

  if(id==='dmg_boost'){
    MATCH.activePowerups.dmg_boost=true;
    MATCH.log='⚔️ Attacco potenziato! La tua prossima carta fa il 50% di danni in più!';
  } else if(id==='def_shield'){
    MATCH.activePowerups.def_shield=true;
    MATCH.log='🛡️ Scudo attivato! Nessun danno nemico questo turno!';
  } else if(id==='heal_potion'){
    MATCH.playerHP=Math.min(20,MATCH.playerHP+3);
    MATCH.log='💊 Curato! +3 HP recuperati.';
    showDamageNum('+3 HP','#4ade80',true);
  } else if(id==='instant_dmg'){
    MATCH.botHP=Math.max(0,MATCH.botHP-2);
    MATCH.log='💥 Danno istantaneo! Il bot perde 2 HP!';
    showDamageNum('-2 HP','#ef4444',false);
    if(MATCH.botHP<=0){ setTimeout(()=>endMatch(),500); return; }
  } else if(id==='double_draw'){
    for(let i=0;i<2;i++){
      if(MATCH.playerDeck.length>0) MATCH.playerHand.push(MATCH.playerDeck.shift());
    }
    MATCH.log='🃏 Pesca doppia! +2 carte in mano.';
  }
  renderMatch();
  setTimeout(()=>{
    const puBtns=document.querySelectorAll('.powerup-btn');
    puBtns.forEach(b=>{ b.style.animation='powerupActivate .4s'; setTimeout(()=>b.style.animation='',400); });
  },50);
}

function playCard(){
  if(!MATCH.selectedCard) return;
  MATCH.playerField=MATCH.selectedCard;
  MATCH.playerHand=MATCH.playerHand.filter(id=>id!==MATCH.selectedCard);
  MATCH.selectedCard=null;
  // Bot plays
  if(MATCH.botHand.length>0){
    const idx=Math.floor(Math.random()*MATCH.botHand.length);
    MATCH.botField=MATCH.botHand[idx];
    MATCH.botHand.splice(idx,1);
  } else if(MATCH.botDeck.length>0){
    MATCH.botField=MATCH.botDeck.shift();
  }
  MATCH.phase='battle';
  MATCH.log='Entrambe le carte sono in campo! Premi COMBATTI!';
  renderMatch();
  // Slide in animation
  setTimeout(()=>{
    const ps=document.getElementById('playerFieldSlot'), bs=document.getElementById('botFieldSlot');
    if(ps) ps.style.animation='battleSlam .4s cubic-bezier(.34,1.56,.64,1)';
    if(bs) bs.style.animation='battleSlam .4s cubic-bezier(.34,1.56,.64,1)';
  },50);
}

function showDamageNum(text, color, isPlayer){
  const slot=document.getElementById(isPlayer?'playerFieldSlot':'botFieldSlot');
  if(!slot) return;
  const el=document.createElement('div');
  const rect=slot.getBoundingClientRect();
  el.style.cssText=`position:fixed;left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:${color};text-shadow:0 0 20px ${color};z-index:9000;pointer-events:none;animation:damageNum .9s ease-out forwards`;
  el.textContent=text;
  document.body.appendChild(el); setTimeout(()=>el.remove(),900);
}

function executeBattle(){
  const playerCard=ALL_CARDS.find(c=>c.id===MATCH.playerField);
  const botCard=ALL_CARDS.find(c=>c.id===MATCH.botField);
  if(!playerCard||!botCard) return;
  MATCH.round++;

  let playerAtk=playerCard.attack;
  if(MATCH.activePowerups.dmg_boost){ playerAtk=Math.floor(playerAtk*1.5); delete MATCH.activePowerups.dmg_boost; }

  const rawPlayerDmg=Math.max(0,playerAtk-botCard.defense);
  let rawBotDmg=Math.max(0,botCard.attack-playerCard.defense);
  if(MATCH.activePowerups.def_shield){ rawBotDmg=0; delete MATCH.activePowerups.def_shield; }

  const playerHPDmg=rawPlayerDmg>0?Math.max(1,Math.floor(rawPlayerDmg/40)):0;
  const botHPDmg=rawBotDmg>0?Math.max(1,Math.floor(rawBotDmg/40)):0;

  // Animate — loser card cracks
  const pSlot=document.getElementById('playerFieldSlot');
  const bSlot=document.getElementById('botFieldSlot');
  const pAnim=document.getElementById('playerCardAnim');
  const bAnim=document.getElementById('botCardAnim');

  if(playerHPDmg>botHPDmg){
    // player wins round — bot card breaks
    if(bAnim){ bAnim.style.animation='loseCrack .8s forwards'; }
    if(pAnim){ pAnim.style.animation='winPulse .6s'; }
    if(bSlot){ bSlot.style.animation='damageShake .4s'; }
  } else if(botHPDmg>playerHPDmg){
    // bot wins round — player card breaks
    if(pAnim){ pAnim.style.animation='loseCrack .8s forwards'; }
    if(bAnim){ bAnim.style.animation='winPulse .6s'; }
    if(pSlot){ pSlot.style.animation='damageShake .4s'; }
  } else {
    // draw
    if(pSlot) pSlot.style.animation='damageShake .4s';
    if(bSlot) bSlot.style.animation='damageShake .4s';
  }

  setTimeout(()=>{
    MATCH.botHP=Math.max(0,MATCH.botHP-playerHPDmg);
    MATCH.playerHP=Math.max(0,MATCH.playerHP-botHPDmg);

    // Show damage numbers
    if(playerHPDmg>0) showDamageNum(`-${playerHPDmg}HP`,'#ef4444',false);
    if(botHPDmg>0) setTimeout(()=>showDamageNum(`-${botHPDmg}HP`,'#f87171',true),200);

    // Build log
    let log='';
    if(playerHPDmg>0&&botHPDmg>0) log=`${playerCard.name} vs ${botCard.name} · Scambio! Bot -${playerHPDmg}HP, Tu -${botHPDmg}HP`;
    else if(playerHPDmg>0) log=`${playerCard.name} vince! Bot perde ${playerHPDmg}HP ⚔️`;
    else if(botHPDmg>0) log=`${botCard.name} vince! Tu perdi ${botHPDmg}HP 💥`;
    else log='Pareggio! Nessun danno.';
    MATCH.log=log;

    // Clear
    MATCH.playerField=null; MATCH.botField=null;
    MATCH.phase='choose'; MATCH.powerupsUsed={};

    // Draw
    if(MATCH.playerDeck.length>0) MATCH.playerHand.push(MATCH.playerDeck.shift());
    if(MATCH.botDeck.length>0) MATCH.botHand.push(MATCH.botDeck.shift());

    // Check end
    if(MATCH.playerHP<=0||MATCH.botHP<=0||(MATCH.playerHand.length===0&&MATCH.playerDeck.length===0)){
      setTimeout(()=>endMatch(),600);
      return;
    }
    renderMatch();
  },600);
}

function endMatchAbort(){
  endMatchResult(false,'Abbandono');
}

function endMatch(){
  const won=MATCH.botHP<=0||(MATCH.playerHP>MATCH.botHP&&MATCH.playerHand.length===0);
  const draw=MATCH.playerHP<=0&&MATCH.botHP<=0;
  endMatchResult(won&&!draw,draw?'Pareggio':'');
}

function endMatchResult(won, label){
  STATE.totalMatches++;
  const coinReward=won?50+MATCH.round*5:10; // Always get coins
  const diamondReward=won?3:1;
  updateCoins(coinReward); updateDiamonds(diamondReward);

  const title=label||( won?'VITTORIA!':'SCONFITTA' );
  const ov=document.createElement('div'); ov.className='result-overlay';
  ov.innerHTML=`
    <div class="result-title ${won?'result-win':'result-lose'}">${title}</div>
    ${won?`<div style="font-size:3rem;animation:float 2s ease-in-out infinite">🏆</div>`:`<div style="font-size:3rem">💀</div>`}
    <div class="glass-panel" style="padding:28px;text-align:center;min-width:300px">
      <div style="font-family:'Orbitron',sans-serif;font-size:.8rem;opacity:.6;margin-bottom:12px">Round giocati: ${MATCH.round}</div>
      <div style="display:flex;gap:20px;justify-content:center;margin-bottom:16px">
        <div style="text-align:center">
          <div style="font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--gold2)">+${coinReward}</div>
          <div style="font-size:.7rem;opacity:.6">${coinSVG(14)} Monete</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--diamond)">+${diamondReward}</div>
          <div style="font-size:.7rem;opacity:.6">${diamondSVG(14)} Diamanti</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="menu-btn btn-match" style="min-width:auto;padding:10px 22px;font-size:.8rem" onclick="this.closest('.result-overlay').remove();startMatch()">🔄 Rivincita</button>
        <button class="menu-btn btn-shop" style="min-width:auto;padding:10px 22px;font-size:.8rem" onclick="this.closest('.result-overlay').remove();showScreen('menu');renderMenu()">🏠 Menu</button>
      </div>
    </div>
  `;
  document.getElementById('match-screen').appendChild(ov);
  // Particles for win
  if(won){ for(let i=0;i<20;i++) setTimeout(()=>spawnConfetti(),i*80); }
}

function spawnConfetti(){
  const colors=['#ffd700','#a855f7','#06b6d4','#ef4444','#4ade80'];
  const c=document.createElement('div');
  const size=8+Math.random()*8;
  c.style.cssText=`position:fixed;left:${10+Math.random()*80}%;top:-10px;width:${size}px;height:${size}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${colors[Math.floor(Math.random()*colors.length)]};z-index:5100;pointer-events:none;animation:confettiFall ${1.5+Math.random()}s ease-in forwards`;
  if(!document.getElementById('confettiKF')){
    const st=document.createElement('style'); st.id='confettiKF';
    st.textContent='@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(c); setTimeout(()=>c.remove(),2500);
}

// ============================================================
// INIT
// ============================================================
initStars();
// Give starter cards
if(Object.keys(STATE.collection).length===0){
  const commons=ALL_CARDS.filter(c=>c.rarity==='common');
  for(let i=0;i<10;i++){
    const card=commons[Math.floor(Math.random()*commons.length)];
    STATE.collection[card.id]=(STATE.collection[card.id]||0)+1;
  }
  const owned=Object.keys(STATE.collection).map(Number);
  for(let i=0;i<5&&i<owned.length;i++) STATE.deck.push(owned[i]);
}
runIntro();
</script>
