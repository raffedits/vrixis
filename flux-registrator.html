<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Registrator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text: rgba(255,255,255,0.95);
    --text-dim: rgba(255,255,255,0.50);
    --red: rgba(255,90,90,0.9);
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Outfit', sans-serif;
    background: #060612;
    overflow: hidden;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    opacity: 0.3;
    pointer-events: none;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(90px);
    animation: drift ease-in-out infinite alternate;
  }
  .orb1 { width:600px;height:600px;background:radial-gradient(circle at 40% 40%,#2255ff,transparent 70%);top:-150px;left:-150px;opacity:.55;animation-duration:12s; }
  .orb2 { width:500px;height:500px;background:radial-gradient(circle at 60% 60%,#8822ff,transparent 70%);bottom:-100px;right:-100px;opacity:.45;animation-duration:15s;animation-delay:-5s; }
  .orb3 { width:350px;height:350px;background:radial-gradient(circle at 50% 50%,#00aaff,transparent 70%);top:35%;left:45%;opacity:.35;animation-duration:10s;animation-delay:-3s; }
  .orb4 { width:250px;height:250px;background:radial-gradient(circle at 50% 50%,#ff44aa,transparent 70%);top:10%;right:15%;opacity:.25;animation-duration:18s;animation-delay:-9s; }
  @keyframes drift {
    0%   { transform:translate(0,0) scale(1); }
    50%  { transform:translate(25px,-30px) scale(1.06); }
    100% { transform:translate(-20px,20px) scale(0.94); }
  }

  /* ── VIEWS ── */
  .view {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
    transition: opacity 0.65s ease, transform 0.65s cubic-bezier(0.4,0,0.2,1);
  }
  .view.hidden {
    opacity: 0; pointer-events: none; transform: scale(0.96);
  }

  /* ════════ SPLASH ════════ */
  #splash { flex-direction: column; align-items: center; }

  .logo-glass {
    position: relative; width: 230px; height: 230px;
    display: flex; align-items: center; justify-content: center;
    animation: logoIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  }
  @keyframes logoIn {
    from { opacity:0; transform:scale(0.55) translateY(24px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .logo-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.28) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 75%, rgba(120,160,255,0.15) 0%, transparent 55%),
      linear-gradient(135deg, rgba(255,255,255,0.12), rgba(100,120,255,0.08));
    border: 1.5px solid rgba(255,255,255,0.28);
    backdrop-filter: blur(30px) saturate(200%);
    -webkit-backdrop-filter: blur(30px) saturate(200%);
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.25),
      inset 0 -2px 4px rgba(0,0,20,0.3),
      0 30px 80px rgba(60,80,255,0.3),
      0 0 120px rgba(100,60,255,0.2);
    animation: ringBreath 4s ease-in-out infinite;
  }
  @keyframes ringBreath {
    0%,100% { box-shadow: inset 0 2px 4px rgba(255,255,255,0.25), inset 0 -2px 4px rgba(0,0,20,0.3), 0 30px 80px rgba(60,80,255,0.3), 0 0 120px rgba(100,60,255,0.2); transform:scale(1); }
    50%      { box-shadow: inset 0 2px 6px rgba(255,255,255,0.35), inset 0 -2px 6px rgba(0,0,20,0.4), 0 30px 100px rgba(60,80,255,0.48), 0 0 160px rgba(100,60,255,0.38); transform:scale(1.025); }
  }

  .logo-ring-inner {
    position: absolute; width: 165px; height: 165px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: radial-gradient(ellipse at 35% 30%, rgba(255,255,255,0.18) 0%, transparent 50%);
    backdrop-filter: blur(10px);
    animation: innerSpin 22s linear infinite;
  }
  @keyframes innerSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .logo-icon {
    position: relative; z-index: 2;
    width: 54px; height: 54px;
    filter: drop-shadow(0 0 18px rgba(120,180,255,0.85)) drop-shadow(0 0 44px rgba(80,120,255,0.55));
    animation: iconFloat 3.2s ease-in-out infinite;
  }
  @keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  .logo-orbit { position:absolute; width:100%; height:100%; animation:orbitSpin 6s linear infinite; }
  @keyframes orbitSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .logo-particle {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    width:8px; height:8px; border-radius:50%;
    background:rgba(180,210,255,0.95);
    box-shadow:0 0 14px rgba(140,180,255,1),0 0 32px rgba(100,150,255,0.8);
  }
  .logo-orbit2 { animation-duration:9.5s; animation-direction:reverse; }
  .logo-particle2 {
    top:auto; bottom:14px; width:5px; height:5px;
    background:rgba(220,180,255,0.85);
    box-shadow:0 0 10px rgba(200,150,255,1),0 0 24px rgba(160,100,255,0.7);
  }

  /* Third orbit */
  .logo-orbit3 { animation-duration:13s; }
  .logo-particle3 {
    top:50%; left:10px; transform:translateY(-50%);
    width:4px; height:4px;
    background:rgba(160,255,220,0.8);
    box-shadow:0 0 8px rgba(100,255,200,1),0 0 18px rgba(60,220,180,0.6);
  }

  /* Title */
  .splash-title {
    text-align: center;
    animation: fadeUp 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(22px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .word-flux {
    display: block;
    font-size: 6.5rem; font-weight: 100;
    letter-spacing: 0.22em; text-transform: uppercase; line-height: 0.95;
    background: linear-gradient(135deg, #ffffff 0%, rgba(160,210,255,0.95) 40%, rgba(190,150,255,0.95) 75%, rgba(255,160,220,0.9) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 40px rgba(100,150,255,0.5)) drop-shadow(0 0 80px rgba(140,80,255,0.3));
    animation: titleShimmerGrad 6s ease-in-out infinite;
    background-size: 200% 200%;
  }
  @keyframes titleShimmerGrad {
    0%,100% { background-position: 0% 50%; filter: drop-shadow(0 0 40px rgba(100,150,255,0.5)) drop-shadow(0 0 80px rgba(140,80,255,0.3)); }
    50%      { background-position: 100% 50%; filter: drop-shadow(0 0 60px rgba(100,180,255,0.75)) drop-shadow(0 0 120px rgba(140,80,255,0.5)); }
  }
  .word-registrator {
    display: block;
    font-size: 1.45rem; font-weight: 200;
    letter-spacing: 0.52em; text-transform: uppercase;
    background: linear-gradient(90deg, rgba(180,210,255,0.7), rgba(200,160,255,0.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-top: 4px;
  }

  .splash-tagline {
    margin-top: 14px;
    font-size: 0.75rem; font-weight: 300; letter-spacing: 0.09em;
    color: rgba(255,255,255,0.25);
    animation: fadeUp 0.8s ease 0.55s both;
  }

  /* Start button */
  .btn-start {
    margin-top: 42px;
    position: relative; overflow: hidden;
    padding: 15px 58px;
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 60px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.98rem; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    cursor: pointer;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.18) 0%, transparent 60%),
      linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(120,140,255,0.10) 50%, rgba(80,80,255,0.07) 100%);
    backdrop-filter: blur(20px);
    box-shadow:
      0 8px 32px rgba(80,100,255,0.28),
      0 2px 8px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -1px 0 rgba(0,0,0,0.12);
    transition: all 0.38s cubic-bezier(0.34,1.56,0.64,1);
    animation: fadeUp 0.8s ease 0.75s both;
  }
  .btn-start::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 55%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-18deg);
    animation: shimmer 3.2s ease-in-out infinite 1.8s;
  }
  @keyframes shimmer { 0%{left:-100%} 40%{left:130%} 100%{left:130%} }
  .btn-start:hover {
    transform: scale(1.07) translateY(-2px);
    box-shadow: 0 16px 52px rgba(80,100,255,0.48), 0 4px 14px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.38);
  }
  .btn-start:active { transform: scale(0.97); }

  .splash-dots {
    margin-top: 34px; display: flex; gap: 8px;
    animation: fadeUp 0.8s ease 0.9s both;
  }
  .splash-dot { width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.18); }
  .splash-dot.active { background:rgba(120,180,255,0.75); box-shadow:0 0 8px rgba(120,180,255,0.55); }

  /* ════════ APP ════════ */
  #app { flex-direction: column; align-items: center; }

  .card {
    position: relative; z-index: 1; width: 360px; padding: 34px 28px;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.13) 0%, transparent 60%),
      linear-gradient(160deg, rgba(255,255,255,0.09) 0%, rgba(80,100,255,0.05) 100%);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 28px;
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    box-shadow:
      0 12px 50px rgba(0,0,0,0.32),
      inset 0 1.5px 0 rgba(255,255,255,0.28),
      inset 0 -1px 0 rgba(255,255,255,0.04);
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform:scale(0.88) translateY(16px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .app-header { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
  .app-header-dot { width:6px;height:6px;border-radius:50%;background:rgba(120,180,255,0.75);box-shadow:0 0 8px rgba(120,180,255,0.6); }
  .app-header h1 { font-size:0.7rem;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.38); }

  .select-wrap { position:relative; margin-bottom:20px; }
  .select-wrap label { display:block;font-size:0.67rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px; }
  select { width:100%;padding:11px 36px 11px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:13px;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.87rem;font-weight:300;appearance:none;cursor:pointer;transition:all 0.3s; }
  select:focus { outline:none;border-color:rgba(100,170,255,0.5);box-shadow:0 0 0 3px rgba(100,170,255,0.1); }
  select option { background:#12122a; }
  .select-arrow { position:absolute;right:13px;bottom:13px;pointer-events:none;color:var(--text-dim);font-size:0.62rem; }

  .visualizer-wrap { margin-bottom:20px;height:66px;background:rgba(0,0,0,0.18);border-radius:15px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;position:relative; }
  canvas { width:100%;height:100%;display:block; }

  .timer { text-align:center;font-size:2.5rem;font-weight:100;letter-spacing:0.08em;color:var(--text);margin-bottom:22px;font-variant-numeric:tabular-nums;font-family:'Outfit',sans-serif;transition:color 0.4s,text-shadow 0.4s; }
  .timer.recording { color:rgba(255,110,110,0.95);text-shadow:0 0 26px rgba(255,80,80,0.55); }

  .btn-record { display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border:none;border-radius:16px;font-family:'Outfit',sans-serif;font-size:0.93rem;font-weight:400;letter-spacing:0.09em;text-transform:uppercase;cursor:pointer;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden; }
  .btn-record::before { content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);transform:skewX(-15deg); }
  .btn-record.idle::before { animation:shimmer 4s ease-in-out infinite 2s; }
  .btn-record.idle { background:linear-gradient(135deg,rgba(100,170,255,0.22),rgba(80,80,255,0.16));border:1px solid rgba(100,170,255,0.28);color:white;box-shadow:0 4px 20px rgba(80,120,255,0.2),inset 0 1px 0 rgba(255,255,255,0.18); }
  .btn-record.idle:hover { transform:scale(1.03);box-shadow:0 6px 32px rgba(80,120,255,0.4),inset 0 1px 0 rgba(255,255,255,0.25); }
  .btn-record.recording { background:linear-gradient(135deg,rgba(255,80,80,0.28),rgba(180,30,30,0.22));border:1px solid rgba(255,80,80,0.33);color:white;box-shadow:0 4px 20px rgba(255,80,80,0.25),inset 0 1px 0 rgba(255,255,255,0.12); }
  .btn-record.recording:hover { transform:scale(1.03); box-shadow:0 6px 32px rgba(255,80,80,0.45),inset 0 1px 0 rgba(255,255,255,0.25); border-color:rgba(255,80,80,0.5); }

  .btn-dot { width:9px;height:9px;border-radius:50%;background:currentColor;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0; }
  .recording .btn-dot { border-radius:2px;transform:scale(0.72); }

  /* Modal */
  .modal-overlay { position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity 0.35s; }
  .modal-overlay.show { opacity:1;pointer-events:all; }
  .modal { width:308px;background:radial-gradient(ellipse at 20% 15%,rgba(255,255,255,0.12) 0%,transparent 55%),linear-gradient(160deg,rgba(255,255,255,0.09),rgba(80,80,255,0.05));border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:28px 24px;backdrop-filter:blur(40px);box-shadow:0 24px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.22);transform:scale(0.86) translateY(14px);transition:transform 0.44s cubic-bezier(0.34,1.56,0.64,1);text-align:center; }
  .modal-overlay.show .modal { transform:scale(1) translateY(0); }
  .modal-icon { font-size:2.2rem;margin-bottom:10px; }
  .modal h2 { font-size:1rem;font-weight:500;color:var(--text);margin-bottom:5px; }
  .modal p  { font-size:0.78rem;color:var(--text-dim);margin-bottom:16px;font-weight:300; }
  .modal-dur { display:inline-block;font-size:0.75rem;font-weight:400;color:rgba(120,200,255,0.9);background:rgba(100,170,255,0.1);border:1px solid rgba(100,170,255,0.2);border-radius:20px;padding:3px 14px;margin-bottom:18px;letter-spacing:0.05em; }
  .btn-group { display:flex;flex-direction:column;gap:9px; }
  .btn-modal { padding:13px;border-radius:13px;border:none;font-family:'Outfit',sans-serif;font-size:0.87rem;font-weight:400;cursor:pointer;transition:all 0.25s;letter-spacing:0.04em; }
  .btn-save { background:linear-gradient(135deg,rgba(60,200,110,0.28),rgba(30,150,70,0.22));border:1px solid rgba(60,200,110,0.3);color:rgba(130,255,170,0.95);box-shadow:0 3px 14px rgba(50,180,90,0.18); }
  .btn-save:hover { transform:translateY(-1px);box-shadow:0 6px 22px rgba(50,180,90,0.38); }
  .btn-new { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text-dim); }
  .btn-new:hover { background:rgba(255,255,255,0.11);color:var(--text); }

  /* Notif */
  .notif { position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);backdrop-filter:blur(20px);padding:9px 22px;border-radius:50px;font-size:0.82rem;font-weight:400;opacity:0;pointer-events:none;transition:all 0.42s cubic-bezier(0.34,1.56,0.64,1);z-index:100;white-space:nowrap; }
  .notif.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<!-- ══ SPLASH ══ -->
<div class="view" id="splash">
  <div style="display:flex;flex-direction:column;align-items:center;">

    <div class="splash-title">
      <span class="word-flux">FLUX</span>
      <span class="word-registrator">Registrator</span>
    </div>

    <p class="splash-tagline">registrazione vocale · liquid glass</p>

    <button class="btn-start" id="btnStart">Inizia</button>

    <div class="splash-dots">
      <div class="splash-dot active"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="view hidden" id="app">
  <div class="card">
    <div class="app-header">
      <div class="app-header-dot"></div>
      <h1>Flux Registrator</h1>
    </div>

    <div class="select-wrap">
      <label>Microfono</label>
      <select id="micSelect"><option>Caricamento...</option></select>
      <span class="select-arrow">▾</span>
    </div>

    <div class="visualizer-wrap" id="vizWrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="timer" id="timer">00:00</div>

    <button class="btn-record idle" id="recordBtn">
      <span class="btn-dot"></span>
      <span id="btnLabel">Registra</span>
    </button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon">🎙️</div>
    <h2>Registrazione Completata</h2>
    <p>Cosa vuoi fare con questa registrazione?</p>
    <div class="modal-dur" id="modalDur">00:00</div>
    <div class="btn-group">
      <button class="btn-modal btn-save" id="btnSave">Salva come MP3</button>
      <button class="btn-modal btn-new" id="btnNew">Nuova Registrazione</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
  /* Navigation */
  const splashEl = document.getElementById('splash');
  const appView  = document.getElementById('app');

  document.getElementById('btnStart').addEventListener('click', () => {
    splashEl.classList.add('hidden');
    appView.classList.remove('hidden');
    loadMics();
    resizeCanvas();
    drawIdle();
  });

  /* Recorder */
  let mediaRecorder=null,audioChunks=[],stream=null;
  let audioCtx=null,analyser=null,animFrame=null;
  let timerInterval=null,seconds=0,isRecording=false;

  const micSelect = document.getElementById('micSelect');
  const recordBtn = document.getElementById('recordBtn');
  const btnLabel  = document.getElementById('btnLabel');
  const timerEl   = document.getElementById('timer');
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const modal     = document.getElementById('modal');
  const modalDur  = document.getElementById('modalDur');
  const btnSave   = document.getElementById('btnSave');
  const btnNew    = document.getElementById('btnNew');
  const notif     = document.getElementById('notif');

  function resizeCanvas() {
    const wrap = document.getElementById('vizWrap');
    if (!wrap) return;
    canvas.width  = wrap.clientWidth  * window.devicePixelRatio;
    canvas.height = wrap.clientHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  window.addEventListener('resize', resizeCanvas);

  async function loadMics() {
    try {
      await navigator.mediaDevices.getUserMedia({audio:true});
      const devs = await navigator.mediaDevices.enumerateDevices();
      const mics = devs.filter(d => d.kind==='audioinput');
      micSelect.innerHTML = '';
      mics.forEach((m,i) => {
        const o = document.createElement('option');
        o.value = m.deviceId;
        o.textContent = m.label || `Microfono ${i+1}`;
        micSelect.appendChild(o);
      });
    } catch { micSelect.innerHTML='<option>Accesso negato</option>'; }
  }

  let idlePhase = 0;
  function drawIdle() {
    const w = canvas.width/window.devicePixelRatio, h = canvas.height/window.devicePixelRatio;
    ctx.clearRect(0,0,w,h);
    const bars=44, bw=3, gap=(w-bars*bw)/(bars+1);
    for(let i=0;i<bars;i++){
      const wave=Math.sin(idlePhase+i*0.38)*9+11, y=(h-wave)/2;
      ctx.beginPath(); ctx.roundRect(gap+i*(bw+gap),y,bw,wave,2);
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
    }
    idlePhase+=0.038;
    if(!isRecording) animFrame=requestAnimationFrame(drawIdle);
  }

  function drawWave() {
    if(!analyser) return;
    const w=canvas.width/window.devicePixelRatio, h=canvas.height/window.devicePixelRatio;
    ctx.clearRect(0,0,w,h);
    const buf=analyser.frequencyBinCount, data=new Uint8Array(buf);
    analyser.getByteFrequencyData(data);
    const bars=44, bw=3, gap=(w-bars*bw)/(bars+1);
    for(let i=0;i<bars;i++){
      const idx=Math.floor(i/bars*buf*0.65), val=data[idx]/255;
      const bh=Math.max(3,val*(h-12)+3), y=(h-bh)/2;
      ctx.beginPath(); ctx.roundRect(gap+i*(bw+gap),y,bw,bh,2);
      ctx.fillStyle=`rgba(255,${Math.round(80+val*50)},${Math.round(80+val*20)},${0.45+val*0.55})`;
      ctx.fill();
    }
    if(isRecording) animFrame=requestAnimationFrame(drawWave);
  }

  function fmt(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

  recordBtn.addEventListener('click', ()=> isRecording ? stopRecording() : startRecording());

  async function startRecording() {
    try { stream=await navigator.mediaDevices.getUserMedia({audio:{deviceId:micSelect.value}}); }
    catch { showNotif('Impossibile accedere al microfono',true); return; }
    audioCtx=new AudioContext(); analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    mediaRecorder=new MediaRecorder(stream); audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    isRecording=true;
    recordBtn.className='btn-record recording'; btnLabel.textContent='Stop';
    timerEl.className='timer recording';
    seconds=0; timerEl.textContent='00:00';
    timerInterval=setInterval(()=>{seconds++;timerEl.textContent=fmt(seconds);},1000);
    cancelAnimationFrame(animFrame); drawWave();
  }

  function stopRecording() {
    mediaRecorder.stop(); isRecording=false;
    clearInterval(timerInterval);
    stream.getTracks().forEach(t=>t.stop()); audioCtx.close();
    recordBtn.className='btn-record idle'; btnLabel.textContent='Registra';
    timerEl.className='timer';
    cancelAnimationFrame(animFrame); drawIdle();
    modalDur.textContent=fmt(seconds);
    setTimeout(()=>modal.classList.add('show'),120);
  }

  btnSave.addEventListener('click',()=>{
    const blob=new Blob(audioChunks,{type:'audio/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`flux_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.mp3`;
    a.click(); URL.revokeObjectURL(url);
    closeModal(); showNotif('✓ Registrazione salvata'); resetTimer();
  });

  btnNew.addEventListener('click',()=>{ audioChunks=[]; closeModal(); resetTimer(); });

  function closeModal(){ modal.classList.remove('show'); }
  function resetTimer(){ seconds=0; timerEl.textContent='00:00'; }

  function showNotif(msg,err=false){
    notif.textContent=msg;
    notif.style.background=err?'rgba(255,80,80,0.18)':'rgba(60,200,110,0.18)';
    notif.style.borderColor=err?'rgba(255,80,80,0.3)':'rgba(60,200,110,0.3)';
    notif.style.color=err?'rgba(255,140,140,0.95)':'rgba(130,255,170,0.95)';
    notif.classList.add('show');
    setTimeout(()=>notif.classList.remove('show'),2800);
  }
</script>
</body>
