<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════════
const R = new THREE.WebGLRenderer({antialias:true,logarithmicDepthBuffer:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
document.body.appendChild(R.domElement);
const CAM = new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.1,2000000000);

// ═══════════════════════════════════════════════════════════
// NOISE / UTILS
// ═══════════════════════════════════════════════════════════
const h21=(x,y,s=0)=>{const v=Math.sin(x*127.1+y*311.7+s*74.3)*43758.5453;return v-Math.floor(v);};
const fbm=(x,y,o,s=0)=>{let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*h21(x*f,y*f,s+i*17);a*=.5;f*=2.1;}return v;};
const mkC=(sz,fn)=>{const c=document.createElement('canvas');c.width=c.height=sz;fn(c.getContext('2d'),sz);return new THREE.CanvasTexture(c);};
const V3=(...a)=>new THREE.Vector3(...a);
const Q=()=>new THREE.Quaternion();

// ═══════════════════════════════════════════════════════════
// SHARED STAR FIELD
// ═══════════════════════════════════════════════════════════
function mkStars(scene,N,spread,sz,op=.9){
  const g=new THREE.BufferGeometry(),p=new Float32Array(N*3),c=new Float32Array(N*3);
  const pal=[[1,.95,.85],[.85,.9,1],[1,1,1],[1,.8,.6],[.7,.85,1],[.9,.9,.95]];
  for(let i=0;i<N;i++){
    const r=spread*(.12+Math.random()*.88),th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
    const col=pal[~~(Math.random()*pal.length)];c[i*3]=col[0];c[i*3+1]=col[1];c[i*3+2]=col[2];
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  g.setAttribute('color',new THREE.BufferAttribute(c,3));
  const pts=new THREE.Points(g,new THREE.PointsMaterial({size:sz,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:op}));
  pts.frustumCulled=false;
  scene.add(pts);return pts;
}

// ── PERMANENT BACKGROUND SKYBOX — always visible at every scale ────────────
// These are NOT sizeAttenuation — they stay the same pixel size always
function mkSkyStars(N,sz,initOp){
  const g=new THREE.BufferGeometry(),p=new Float32Array(N*3),c=new Float32Array(N*3);
  const pal=[[1,.95,.85],[.85,.9,1],[1,1,1],[1,.8,.6],[.7,.85,1]];
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    const r=900000000;
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
    const col=pal[~~(Math.random()*pal.length)];c[i*3]=col[0];c[i*3+1]=col[1];c[i*3+2]=col[2];
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  g.setAttribute('color',new THREE.BufferAttribute(c,3));
  const mat=new THREE.PointsMaterial({size:sz,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:initOp});
  const pts=new THREE.Points(g,mat);
  pts.frustumCulled=false;
  SS.add(pts);
  return mat;
}

// ═══════════════════════════════════════════════════════════
// ██ SPACE SCENE
// ═══════════════════════════════════════════════════════════
const SS=new THREE.Scene();
SS.add(new THREE.AmbientLight(0x0d1525,.7));
const sunPt=new THREE.PointLight(0xfff8e0,5,500000);
SS.add(sunPt);
mkStars(SS,6000,28000,.9);
mkStars(SS,4000,120000,1.6);
mkStars(SS,10000,900000,3.5,.7);
mkStars(SS,8000,5000000,7,.55);
// Faint tiny background stars — always visible from start
const skyMatFaint=mkSkyStars(12000,0.7,.50);
// Larger bright stars — start invisible, fade in from Spazio Profondo
const skyMatFar=mkSkyStars(6000,2.0,0);

// SUN — huge, dominant star
const sunMesh=new THREE.Mesh(new THREE.SphereGeometry(180,64,64),new THREE.MeshBasicMaterial({color:0xfff9cc}));
sunMesh.frustumCulled=false;
SS.add(sunMesh);
[[220,.18,0xffcc44],[280,.08,0xff9922],[380,.035,0xff5500],[520,.015,0xff3300]].forEach(([r,o,c])=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,side:THREE.BackSide}));
  m.frustumCulled=false;SS.add(m);
});

// ═══════════════════════════════════════════════════════════
// PLANET TEXTURE LIBRARY
// ═══════════════════════════════════════════════════════════
const TX={
  earth:()=>mkC(1024,(ctx,S)=>{
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){
      const u=px/S,v=py/S,n=fbm(u*5.5,v*5.5,9,3),n2=fbm(u*14,v*14,4,333);
      if(n>.43){
        const t=Math.min(1,(n-.43)*5),m=n2>.55;
        const r=m?~~(130+t*80):~~(42+t*55),g2=m?~~(115+t*60):~~(108+t*72),b=m?~~(90+t*50):~~(35+t*25);
        ctx.fillStyle=`rgb(${r},${g2},${b})`;
      }else{
        const d=Math.max(0,(n-.08)/.35);
        ctx.fillStyle=`rgb(${~~(8+d*28)},${~~(40+d*82)},${~~(95+d*105)})`;
      }
      ctx.fillRect(px,py,2,2);
      const pv=Math.abs(v-.5)*2;if(pv>.80){const pt=Math.min(1,(pv-.80)/.14);ctx.fillStyle=`rgba(235,242,255,${pt*.94})`;ctx.fillRect(px,py,2,2);}
    }
  }),
  mars:()=>mkC(1024,(ctx,S)=>{
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){
      const u=px/S,v=py/S,n=fbm(u*5,v*5,8,4),n2=fbm(u*18,v*18,4,44);
      ctx.fillStyle=`rgb(${~~Math.min(255,145+n*92+(n2-.5)*28)},${~~Math.max(0,Math.min(200,50+n*55+(n2-.5)*14))},${~~Math.max(0,20+n*18)})`;
      ctx.fillRect(px,py,2,2);
    }
    for(let px=0;px<S;px+=2){[[0,10],[S-12,12]].forEach(([y0,h])=>{ctx.fillStyle='rgba(235,238,248,0.86)';ctx.fillRect(px,y0+fbm(px/S*10,y0/S,2,14)*8,2,h);});}
  }),
  mercury:()=>mkC(512,(ctx,S)=>{
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){
      const n=fbm(px/S*7,py/S*7,8,1),m=fbm(px/S*22,py/S*22,4,11),v=~~(128+n*100+(m-.5)*40);
      ctx.fillStyle=`rgb(${~~(v*.97)},${~~(v*.95)},${~~(v*.88)})`;ctx.fillRect(px,py,2,2);
    }
    for(let i=0;i<55;i++){const cx=~~(Math.random()*S),cy=~~(Math.random()*S),cr=2+Math.random()*28;ctx.strokeStyle=`rgba(60,55,50,${.32+Math.random()*.22})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(70,65,58,${.14+Math.random()*.12})`;ctx.fill();}
  }),
  venus:()=>mkC(512,(ctx,S)=>{for(let py=0;py<S;py++){const v=py/S,n=fbm(v*12,0,4,2)+fbm(v*35,0,2,22)*.22,t=.5+Math.sin(v*Math.PI*18+n*6)*.5;ctx.fillStyle=`rgb(${~~(200+t*52)},${~~(162+t*44)},${~~(48+t*44)})`;ctx.fillRect(0,py,S,1);}}),
  jupiter:()=>mkC(512,(ctx,S)=>{
    for(let py=0;py<S;py++){const v=py/S,n=fbm(v*10,0,4,5)+fbm(v*28,0,3,55)*.28,t=.5+Math.sin(v*Math.PI*22+n*7)*.5;ctx.fillStyle=`rgb(${~~(198+t*54)},${~~(146+t*54)},${~~(85+t*44)})`;ctx.fillRect(0,py,S,1);}
    const grd=ctx.createRadialGradient(S*.62,S*.54,0,S*.62,S*.54,S*.085);grd.addColorStop(0,'rgba(155,48,28,0.72)');grd.addColorStop(1,'rgba(155,48,28,0)');
    ctx.save();ctx.translate(S*.62,S*.54);ctx.scale(1,.48);ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,S*.085,0,Math.PI*2);ctx.fill();ctx.restore();
  }),
  saturn:()=>mkC(512,(ctx,S)=>{for(let py=0;py<S;py++){const v=py/S,n=fbm(v*9,0,3,6)+fbm(v*24,0,2,66)*.22,t=.5+Math.sin(v*Math.PI*16+n*5)*.5;ctx.fillStyle=`rgb(${~~(193+t*54)},${~~(166+t*44)},${~~(102+t*50)})`;ctx.fillRect(0,py,S,1);}}),
  uranus:()=>mkC(512,(ctx,S)=>{for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){const n=fbm(px/S*3,py/S*3,4,7);ctx.fillStyle=`rgb(${~~(102+n*42)},${~~(190+n*34)},${~~(208+n*28)})`;ctx.fillRect(px,py,2,2);}}),
  neptune:()=>mkC(512,(ctx,S)=>{
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){const n=fbm(px/S*4,py/S*4,5,8),m=fbm(px/S*12,py/S*12,3,88);ctx.fillStyle=`rgb(${~~(26+n*28)},${~~(68+n*82+m*22)},${~~(182+n*62)})`;ctx.fillRect(px,py,2,2);}
  }),
  moon:()=>mkC(512,(ctx,S)=>{
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){const n=fbm(px/S*5,py/S*5,7,99),m=fbm(px/S*18,py/S*18,3,199),v=~~(148+n*82+(m-.5)*36);ctx.fillStyle=`rgb(${~~(v*.96)},${~~(v*.95)},${~~(v*.91)})`;ctx.fillRect(px,py,2,2);}
    for(let i=0;i<85;i++){const cx=~~(Math.random()*S),cy=~~(Math.random()*S),cr=1+Math.random()*22;ctx.strokeStyle=`rgba(80,78,70,${.28+Math.random()*.28})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(88,86,78,${.10+Math.random()*.12})`;ctx.fill();}
  }),
  exo:(s,r1,g1,b1,r2,g2,b2)=>mkC(512,(ctx,S)=>{
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){
      const n=fbm(px/S*5,py/S*5,7,s*29),m=fbm(px/S*12,py/S*12,3,s*17),t=n*.7+m*.3;
      ctx.fillStyle=`rgb(${~~Math.max(0,Math.min(255,r1+t*(r2-r1)))},${~~Math.max(0,Math.min(255,g1+t*(g2-g1)))},${~~Math.max(0,Math.min(255,b1+t*(b2-b1)))})`;
      ctx.fillRect(px,py,2,2);
    }
  }),
  clouds:(s)=>mkC(512,(ctx,S)=>{
    ctx.clearRect(0,0,S,S);
    for(let px=0;px<S;px+=2)for(let py=0;py<S;py+=2){const n=fbm(px/S*7,py/S*7,6,s);if(n>.50){const a=Math.min(1,(n-.50)*4);ctx.fillStyle=`rgba(255,255,255,${a*.82})`;ctx.fillRect(px,py,2,2);}}
  }),
};

// ═══════════════════════════════════════════════════════════
// PLANET MESH BUILDER
// ═══════════════════════════════════════════════════════════
function mkPlanet(radius,tex,atmo,hasRings,ringTint,tilt,hasClouds,cloudSeed){
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(radius,56,56),
    new THREE.MeshPhongMaterial({map:tex,shininess:6,specular:new THREE.Color(.03,.03,.05)}));
  mesh.rotation.z=tilt||0;
  if(atmo){
    [[1.07,.11],[1.14,.048],[1.24,.018]].forEach(([s,o])=>
      mesh.add(new THREE.Mesh(new THREE.SphereGeometry(radius*s,32,32),new THREE.MeshBasicMaterial({color:atmo,transparent:true,opacity:o,side:THREE.BackSide}))));
  }
  if(hasClouds){
    const cloud=new THREE.Mesh(new THREE.SphereGeometry(radius*1.022,32,32),
      new THREE.MeshPhongMaterial({map:TX.clouds(cloudSeed||42),transparent:true,opacity:.88,depthWrite:false}));
    mesh.add(cloud);mesh.userData.cloud=cloud;
  }
  if(hasRings){
    const ri=radius*1.52,ro=radius*2.62;
    const rg=new THREE.RingGeometry(ri,ro,128);
    const pa=rg.attributes.position,uv=rg.attributes.uv;
    for(let i=0;i<pa.count;i++){const x=pa.getX(i),y=pa.getY(i),r2=Math.sqrt(x*x+y*y);uv.setXY(i,(r2-ri)/(ro-ri),Math.atan2(y,x)/(Math.PI*2));}
    const rc=ringTint||[220,195,145];
    const rt=mkC(256,(ctx,S)=>{
      const g=ctx.createLinearGradient(0,0,S,0);
      g.addColorStop(0,`rgba(${rc[0]},${rc[1]},${rc[2]},0)`);
      g.addColorStop(.15,`rgba(${rc[0]},${rc[1]},${rc[2]},.62)`);
      g.addColorStop(.42,`rgba(${~~(rc[0]*.82)},${~~(rc[1]*.82)},${~~(rc[2]*.82)},.42)`);
      g.addColorStop(.68,`rgba(${rc[0]},${rc[1]},${rc[2]},.58)`);
      g.addColorStop(1,`rgba(${rc[0]},${rc[1]},${rc[2]},0)`);
      ctx.fillStyle=g;ctx.fillRect(0,0,S,S);
    });
    const ring=new THREE.Mesh(rg,new THREE.MeshBasicMaterial({map:rt,transparent:true,opacity:.78,side:THREE.DoubleSide,depthWrite:false}));
    ring.rotation.x=Math.PI/2;mesh.add(ring);
  }
  return mesh;
}

// ═══════════════════════════════════════════════════════════
// SOLAR SYSTEM  (scaled so planets are visible but not huge)
// AU=260  Sun radius=18  planets 4–55 units
// ═══════════════════════════════════════════════════════════
const AU=2200, ETICKS=4000;

const SOL_DEF=[
  {name:"MERCURIO",au:.387,r:30,  tex:TX.mercury(),atmo:null,    rings:false,tilt:.03},
  {name:"VENERE",  au:.723,r:55,  tex:TX.venus(),  atmo:0xffdd88,rings:false,tilt:.05},
  {name:"TERRA",   au:1.0, r:65,  tex:TX.earth(),  atmo:0x4488ff,rings:false,tilt:.41,clouds:true,cseed:33},
  {name:"MARTE",   au:1.524,r:40, tex:TX.mars(),   atmo:0xff5522,rings:false,tilt:.44},
  {name:"GIOVE",   au:5.2, r:200, tex:TX.jupiter(),atmo:0xffaa66,rings:false,tilt:.05},
  {name:"SATURNO", au:9.58,r:170, tex:TX.saturn(), atmo:0xffcc88,rings:true, tilt:.47,rt:[222,198,148]},
  {name:"URANO",   au:19.2,r:100, tex:TX.uranus(), atmo:0x66ccee,rings:true, tilt:1.71,rt:[155,215,228]},
  {name:"NETTUNO", au:30.05,r:90, tex:TX.neptune(),atmo:0x2244cc,rings:false,tilt:.49},
];

const solObjs=[];
SOL_DEF.forEach((d,i)=>{
  const mesh=mkPlanet(d.r,d.tex,d.atmo,d.rings,d.rt,d.tilt,d.clouds,d.cseed);
  const dist=d.au*AU,ang=Math.random()*Math.PI*2;
  mesh.position.set(Math.cos(ang)*dist,0,Math.sin(ang)*dist);
  mesh.userData={ang,dist,os:(Math.PI*2)/(ETICKS*Math.pow(d.au,1.5)),rs:.002+i*.0008};
  SS.add(mesh);
  solObjs.push({mesh,def:d});
});

// Moon
const moonTex=TX.moon();
const moonMesh=mkPlanet(22,moonTex,null,false,null,.09);
SS.add(moonMesh);
let moonAng=0;

// ═══════════════════════════════════════════════════════════
// MILKY WAY — matches reference: teal/green nebula explosion, bright white core
// ═══════════════════════════════════════════════════════════
function buildMW(){
  const grp=new THREE.Group();
  const MW_R=280000;

  // LAYER 1: Dense bright core explosion (white/cyan)
  {const N=8000,g=new THREE.BufferGeometry(),p=new Float32Array(N*3),c=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const t=Math.pow(Math.random(),2.2),arm=i%4,ang=(arm/4)*Math.PI*2+t*Math.PI*4+(Math.random()-.5)*.4;
    const d=t*MW_R*.18;
    p[i*3]=d*Math.cos(ang)+(Math.random()-.5)*MW_R*.02;
    p[i*3+1]=(Math.random()-.5)*MW_R*.008*(1-t*.8);
    p[i*3+2]=d*Math.sin(ang)+(Math.random()-.5)*MW_R*.02;
    const br=.6+Math.random()*.4;c[i*3]=br;c[i*3+1]=br;c[i*3+2]=br;
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));g.setAttribute('color',new THREE.BufferAttribute(c,3));
  const pts=new THREE.Points(g,new THREE.PointsMaterial({size:1.8,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:0}));
  grp.add(pts);}

  // LAYER 2: Teal/green nebula arms (like the image)
  {const N=35000,g=new THREE.BufferGeometry(),p=new Float32Array(N*3),c=new Float32Array(N*3);

      const r=sh.rMin+rng(gi,3)*(sh.rMax-sh.rMin);

// Universe shell: fixed-size pixel dots, camera-relative offset each frame
// This means they're ALWAYS visible regardless of where the camera is
function buildUnivLayer(count,seed,pixSz,op,spread){
  const g=new THREE.BufferGeometry(),p=new Float32Array(count*3),c=new Float32Array(count*3);
  const galCols=[[1.0,.90,.72],[.85,.90,1.0],[1.0,.95,.85],[.70,.85,1.0],[1.0,.78,.55],[.92,.92,1.0],[.80,.70,.95],[.78,.55,.95]];
  const rng=n=>{const v=Math.sin(n*127.1+seed*311.7)*43758.5453;return v-Math.floor(v);};
  for(let i=0;i<count;i++){
    // Distribute on sphere around origin
    const th=rng(i)*Math.PI*2,ph=Math.acos(2*rng(i+count)-.9999);
    const r=spread*(0.3+rng(i+count*2)*0.7);
    p[i*3]=r*Math.sin(ph)*Math.cos(th);
    p[i*3+1]=r*Math.sin(ph)*Math.sin(th)*0.55; // slight flattening for cosmic web feel
    p[i*3+2]=r*Math.cos(ph);
    const ci=~~(rng(i+count*3)*galCols.length),br=.35+rng(i+count*4)*.65;
    c[i*3]=galCols[ci][0]*br;c[i*3+1]=galCols[ci][1]*br;c[i*3+2]=galCols[ci][2]*br;
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  g.setAttribute('color',new THREE.BufferAttribute(c,3));
  // Use sizeAttenuation:false so they stay pixel-sized regardless of zoom
  const mat=new THREE.PointsMaterial({size:pixSz,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:0});
  const pts=new THREE.Points(g,mat);
  pts.frustumCulled=false;
  SS.add(pts);
  return {pts,mat,spread};
}

function buildNebulaTex(){
  const S=1024,cv=document.createElement('canvas');cv.width=cv.height=S;
  const ctx=cv.getContext('2d');

  // Pure black background
  ctx.fillStyle='#000';ctx.fillRect(0,0,S,S);

  // Helper: draw a soft cloud blob
  const blob=(cx,cy,rx,ry,angle,r,g,b,a)=>{
    ctx.save();
    ctx.translate(cx,cy);ctx.rotate(angle);ctx.scale(rx/ry,1);
    const grd=ctx.createRadialGradient(0,0,0,0,0,ry);
    grd.addColorStop(0,`rgba(${r},${g},${b},${a})`);
    grd.addColorStop(.35,`rgba(${r},${g},${b},${a*.55})`);
    grd.addColorStop(.7,`rgba(${r},${g},${b},${a*.18})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,ry,0,Math.PI*2);ctx.fill();
    ctx.restore();
  };

  // ── DEEP DARK SPACE BASE ──────────────────────────────────
  blob(S*.5,S*.5,S*.8,S*.55,0, 0,8,18,.85);
  blob(S*.5,S*.5,S*.65,S*.45,0.3, 0,5,12,.7);

  // ── TEAL NEBULA CORE LIGHT — the big glowing region ──────
  blob(S*.5,S*.46,S*.55,S*.38,.15, 0,155,140,.55);
  blob(S*.5,S*.46,S*.42,S*.28,.15, 0,185,165,.48);
  blob(S*.48,S*.44,S*.32,S*.22,.1, 20,200,180,.40);
  // Extra teal spread top-right
  blob(S*.62,S*.32,S*.28,S*.18,-.3, 0,180,160,.30);
  blob(S*.38,S*.58,S*.25,S*.16, .4, 0,160,145,.28);

  // ── LARGE WHITE-GREY CLOUD PUFFS — left side ─────────────
  // Big bright cloud bottom-left
  blob(S*.22,S*.72,S*.28,S*.20, .5, 200,215,222,.62);
  blob(S*.18,S*.68,S*.22,S*.16, .4, 220,228,232,.55);
  blob(S*.26,S*.78,S*.20,S*.14, .6, 185,200,208,.48);
  // Smaller cloud wisps left
  blob(S*.12,S*.58,S*.14,S*.10, .2, 160,180,192,.42);
  blob(S*.08,S*.50,S*.10,S*.08,-.1, 140,165,178,.35);
  // Cloud upper-left
  blob(S*.15,S*.28,S*.18,S*.12,-.4, 195,210,218,.45);
  blob(S*.10,S*.22,S*.14,S*.09,-.5, 170,188,200,.38);

  // ── WHITE-GREY CLOUD PUFFS — right/bottom ────────────────
  // Bottom cloud
  blob(S*.52,S*.88,S*.32,S*.15, .1, 185,200,210,.52);
  blob(S*.58,S*.92,S*.22,S*.12, .2, 165,185,195,.44);
  blob(S*.42,S*.85,S*.18,S*.11,-.1, 155,175,185,.40);
  // Top-right wisp
  blob(S*.78,S*.22,S*.16,S*.10,-.6, 170,190,200,.38);
  blob(S*.84,S*.28,S*.12,S*.08,-.5, 150,175,188,.32);
  // Right side small clouds
  blob(S*.88,S*.48,S*.12,S*.09, .3, 155,175,185,.35);
  blob(S*.82,S*.58,S*.10,S*.08, .4, 145,168,180,.30);

  // ── TEAL SPIRAL ARMS — the swirling structure ─────────────
  // Draw spiral arm using many small blobs along a spiral path
  for(let i=0;i<60;i++){
    const t=i/59;
    const ang=t*Math.PI*2.2-.8;
    const r=S*(.08+t*.28);
    const cx=S*.5+Math.cos(ang)*r,cy=S*.46+Math.sin(ang)*r*.7;
    const sz=S*(.025+t*.018);
    const bright=1-t*.6;
    blob(cx,cy,sz*1.3,sz,ang+Math.PI/2, ~~(20*bright),~~(190*bright),~~(170*bright), .18+t*.08);
  }
  // Second arm offset
  for(let i=0;i<45;i++){
    const t=i/44;
    const ang=t*Math.PI*1.8+Math.PI-.5;
    const r=S*(.06+t*.22);
    const cx=S*.5+Math.cos(ang)*r,cy=S*.46+Math.sin(ang)*r*.65;
    const sz=S*(.018+t*.012);

  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(.6,'rgba(0,0,0,.05)');

const PAL={
  MERCURIO:[[.38,.36,.32],[.52,.50,.46],[.64,.62,.57]],
  VENERE:  [[.45,.35,.12],[.60,.48,.18],[.72,.60,.24]],
  TERRA:   [[.08,.30,.08],[.14,.42,.11],[.18,.52,.14]],

  NETTUNO: [[.05,.14,.42],[.10,.22,.60],[.14,.28,.75]],
  LUNA:    [[.32,.31,.28],[.50,.48,.44],[.62,.60,.55]],
};
const PALD=[[.32,.30,.27],[.48,.46,.42],[.60,.58,.53]];

// Surface height function (used both for geometry and getH)
function surfH(nx,nz,s){
  let h=fbm(nx,nz,7,s)*22;
  h+=fbm(nx*9,nz*9,4,s+50)*4;
  h-=Math.max(0,(fbm(nx*2.5,nz*2.5,3,s+100)-.53)*10)*8; // craters as negative gaussians
  return h;
}
function getH(x,z){
  if(!SURF_DEF)return 0;
  return surfH(x*.0055,z*.0055,SURF_DEF.seed||1);
}

let TERR_MESH=null,SURF_DEF=null;

function mkTerrain(def){
  if(TERR_MESH){SURF.remove(TERR_MESH);TERR_MESH.geometry.dispose();}
  SURF.children.filter(c=>c.userData.prop).forEach(c=>SURF.remove(c));
  SURF_DEF=def;
  const pal=PAL[def.name]||PALD;
  const s=def.seed||1;
  const W=800,RES=150; // wide terrain, high res
  const geo=new THREE.PlaneGeometry(W,W,RES,RES);
  const pa=geo.attributes.position,vc=new Float32Array(pa.count*3);

  for(let i=0;i<pa.count;i++){
    const x=pa.getX(i),z=pa.getZ(i),nx=x*.0055,nz=z*.0055;
    const h=surfH(nx,nz,s);
    pa.setY(i,h);
    // colour = blend dark→light by height, with fine variation
    const t=Math.max(0,Math.min(1,(h+3)/20));
    const noise=h21(nx*18,nz*18,s)*.08-.04;
    vc[i*3]=Math.max(0,pal[0][0]*(1-t)+pal[2][0]*t+noise);
    vc[i*3+1]=Math.max(0,pal[0][1]*(1-t)+pal[2][1]*t+noise*.8);
    vc[i*3+2]=Math.max(0,pal[0][2]*(1-t)+pal[2][2]*t+noise*.6);
  }
  pa.needsUpdate=true;
  geo.setAttribute('color',new THREE.BufferAttribute(vc,3));
  geo.computeVertexNormals();

  // Detail texture: fine grain + crater rings
  const gtex=mkC(2048,(ctx,S)=>{
    const [p0,p1,p2]=pal;
    ctx.fillStyle=`rgb(${~~(p1[0]*200)},${~~(p1[1]*196)},${~~(p1[2]*186)})`;
    ctx.fillRect(0,0,S,S);
    // Grain
    for(let px=0;px<S;px+=1)for(let py=0;py<S;py+=1){
      const n=h21(px/S*32,py/S*32,s);
      if(n>.62||n<.12){
        const a=(n>.62?(n-.62)/.38:(0.12-n)/.12)*.18;
        ctx.fillStyle=`rgba(${n>.5?255:0},${n>.5?255:0},${n>.5?255:0},${a})`;
        ctx.fillRect(px,py,1,1);
      }
    }
    // Crater rings — very prominent on rocky planets
    const nc=(['MERCURIO','LUNA'].includes(def.name))?110:55;
    for(let i=0;i<nc;i++){
      const cx=Math.random()*S,cy=Math.random()*S,cr=3+Math.random()*60;
      // Raised rim (bright)
      ctx.strokeStyle=`rgba(${~~(p2[0]*230)},${~~(p2[1]*224)},${~~(p2[2]*210)},${.15+Math.random()*.2})`;
      ctx.lineWidth=Math.max(1,cr*.06);
      ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.stroke();
      // Dark interior
      const gi=ctx.createRadialGradient(cx,cy,0,cx,cy,cr*.88);
      gi.addColorStop(0,`rgba(${~~(p0[0]*100)},${~~(p0[1]*96)},${~~(p0[2]*90)},${.16+Math.random()*.14})`);
      gi.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gi;ctx.beginPath();ctx.arc(cx,cy,cr*.88,0,Math.PI*2);ctx.fill();
    }
  });

  TERR_MESH=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({
    vertexColors:true,map:gtex,shininess:1,
    specular:new THREE.Color(.008,.008,.008),
    bumpMap:gtex,bumpScale:.4
  }));
  TERR_MESH.rotation.x=-Math.PI/2;
  TERR_MESH.receiveShadow=true;
  SURF.add(TERR_MESH);

  // ── Rocks: cluster near camera, thin out in distance ─────────────────────
  const rk=pal[2];
  const darkRk=pal[0];
  // Place more rocks close to spawn, fewer far away
  const rockDist=[
    // [count, radiusMin, radiusMax, sizeMin, sizeMax]
    [12,  1,  15, .4, 3.5],  // close — big feature rocks
    [25,  15, 60, .2, 2.2],  // mid
    [35,  60, 250,.1, 1.4],  // far — smaller pebbles
  ];
  rockDist.forEach(([cnt,rMin,rMax,szMin,szMax])=>{
    for(let i=0;i<cnt;i++){
      const angle=Math.random()*Math.PI*2;
      const dist=rMin+Math.random()*(rMax-rMin);
      const rx=Math.cos(angle)*dist,rz=Math.sin(angle)*dist-dist*.3; // bias forward
      const sz=szMin+Math.random()*(szMax-szMin);
      const rnd=Math.random();
      let rm;
      if(rnd<.6){
        // Irregular boulder
        rm=new THREE.Mesh(new THREE.IcosahedronGeometry(sz,~~(Math.random()*2)),
          new THREE.MeshPhongMaterial({color:new THREE.Color(...(Math.random()>.5?rk:darkRk)),shininess:2}));
        rm.scale.set(.7+Math.random()*.8,Math.random()*.6+.35,.7+Math.random()*.8);
      }else{
        // Flat slab
        rm=new THREE.Mesh(new THREE.BoxGeometry(sz*1.4,sz*.4,sz*(0.8+Math.random()*.6)),
          new THREE.MeshPhongMaterial({color:new THREE.Color(...rk),shininess:1}));
      }
      const h=getH(rx,rz);
      rm.position.set(rx,Math.max(0,h)+sz*.18,rz);
      rm.rotation.set((Math.random()-.5)*.28,Math.random()*Math.PI*2,(Math.random()-.5)*.18);
      rm.castShadow=true;rm.receiveShadow=true;rm.userData.prop=true;
      SURF.add(rm);
    }
  });
}

// ─── Proximity ────────────────────────────────────────────────────────────
function checkProx(){
  const cp=CAM.position,dist=cp.length();

  // MW fade — visible when inside it, stays faint even from far
  const mwIn=Math.max(0,Math.min(1,(dist-5000)/25000));
  const mwOut=Math.max(0.10,1-(dist-800000)/1200000);
  MW.setOpacity(Math.min(mwIn,mwOut));

  // 7 main galaxies: fade in from 100k AU, never fade out
  const galFade=Math.max(0,Math.min(1,(dist-100000)/400000));
  galObjs.forEach(go=>{ go.mat.opacity=galFade*.88; });

  // Distant galaxy field — each shell fades in at its own distance
  distGalObjs.forEach(dg=>{
    const t=Math.max(0,Math.min(1,(dist-dg.startD)/(dg.fullD-dg.startD)));
    dg.obj.mat.opacity+=(t*.82-dg.obj.mat.opacity)*.03;
  });

  // Larger far background stars — fade in from Spazio Profondo
  const farStarOp=Math.max(0,Math.min(.70,(dist-10e6)/20e6));
  skyMatFar.opacity+=(farStarOp-skyMatFar.opacity)*.04;

  // Universe shells — camera-relative galaxy dots
  updateUniv(dist);

  // ── Planet proximity — show name when close ───────────────
  const allPlanets=[...solObjs,{mesh:moonMesh,def:{name:'LUNA',r:22}},{mesh:sunMesh,def:{name:'SOLE',r:180}}];
  let nearest=null,nearestDist=Infinity;
  allPlanets.forEach(p=>{
    const wp=p.mesh.getWorldPosition(V3());
    const d=cp.distanceTo(wp);
    if(d<nearestDist){nearestDist=d;nearest=p;}
  });
  if(nearest&&nearestDist<nearest.def.r*18){
    setP('✦  '+nearest.def.name);
  } else {
    setP('');
  }

  // HUD zone
  let nearG=null,ngd=Infinity;
  galObjs.forEach(go=>{const d=cp.distanceTo(go.grp.position);if(d<ngd){ngd=d;nearG=go;}});
  const ls=document.getElementById('loc-sub');
  if(nearG&&ngd<GAL_R*5){
    setZone(nearG.gd.name);ls.textContent='galassia';
  } else if(dist<5000){
    setZone('SISTEMA SOLARE');ls.textContent=(dist/100).toFixed(1)+' AU';
  } else if(dist<300000){
    setZone('VIA LATTEA');ls.textContent=(dist/1000).toFixed(0)+'k AU';
  } else if(dist<14e6){
    setZone('SPAZIO PROFONDO');ls.textContent=(dist/1000).toFixed(0)+'k AU';
  } else if(dist<90e6){
    setZone('UNIVERSO VICINO');ls.textContent=(dist/1e6).toFixed(1)+'M AU';
  } else if(dist<380e6){
    setZone('GRUPPO DI GALASSIE');ls.textContent=(dist/1e6).toFixed(0)+'M AU';
  } else {
    setZone('UNIVERSO OSSERVABILE');ls.textContent=(dist/1e6).toFixed(0)+'M AU';
  }
  if(!currentZone&&!zoneFading){
    document.getElementById('loc-name').textContent=zoneTarget||'SISTEMA SOLARE';
    currentZone=zoneTarget||'SISTEMA SOLARE';
  }
}

// MAIN LOOP
// ═══════════════════════════════════════════════════════════
let lastT=performance.now(),shootT=0,started=false;

function loop(){
  requestAnimationFrame(loop);
  if(!started){R.render(SS,CAM);return;}
  const now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;

  // Camera rotation
    sYaw+=(tYaw-sYaw)*.1;sPitch+=(tPitch-sPitch)*.1;
    CAM.quaternion.copy(Q().setFromAxisAngle(V3(0,1,0),sYaw)).multiply(Q().setFromAxisAngle(V3(1,0,0),sPitch));

    // Movement
    const fwd=V3(0,0,-1).applyQuaternion(CAM.quaternion),rgt=V3(1,0,0).applyQuaternion(CAM.quaternion);
    const acc=V3(),sp=SPD*(1+CAM.position.length()/35000);
    if(K['w'])acc.add(fwd.clone().multiplyScalar(sp));if(K['s'])acc.add(fwd.clone().multiplyScalar(-sp));
    if(K['a'])acc.add(rgt.clone().multiplyScalar(-sp));if(K['d'])acc.add(rgt.clone().multiplyScalar(sp));
    sVel.add(acc);sVel.multiplyScalar(.935);
    CAM.position.add(sVel.clone().multiplyScalar(dt*60));
    bob+=dt*.32;CAM.position.y+=Math.sin(bob)*.008;

    // Solar orbits (Keplerian)
    solObjs.forEach(p=>{
      const ud=p.mesh.userData;ud.ang+=ud.os*SPD*dt*60;
      p.mesh.position.set(Math.cos(ud.ang)*ud.dist,0,Math.sin(ud.ang)*ud.dist);
      p.mesh.rotation.y+=ud.rs*dt*60;
      if(p.mesh.userData.cloud)p.mesh.userData.cloud.rotation.y+=.0003*SPD*dt*60;
    });
    // Moon
    moonAng+=.015*SPD*dt*60;
    const ep=solObjs[2].mesh.position;
    moonMesh.position.set(ep.x+Math.cos(moonAng)*280,ep.y+Math.sin(moonAng*.3)*22,ep.z+Math.sin(moonAng)*280);

    // Galaxy planet orbits
    galObjs.forEach(go=>{
      go.grp.rotation.y+=.00004*dt*60;
      go.galPlanets.forEach(p=>{
        p.mesh.userData.oA+=p.mesh.userData.oS*SPD*dt*60;
        const a=p.mesh.userData.oA,or=p.mesh.userData.orR;
        p.mesh.position.set(Math.cos(a)*or,0,Math.sin(a)*or);
        p.mesh.rotation.y+=p.mesh.userData.rS*dt*60;
      });
    });

    sunPt.intensity=4+Math.sin(now*.001*.5)*.5;

    // Shooters
    shootT+=dt;if(shootT>.5){shootT=0;spawnShooter();}
    for(let i=shooters.length-1;i>=0;i--){
      const s=shooters[i];s.life+=dt;
      const prg=s.life/s.maxLife,f=prg<.15?prg/.15:prg>.75?1-(prg-.75)/.25:1;
      s.mat.opacity=f*.92;s.line.position.add(s.dir.clone().multiplyScalar(s.spd*dt*60*.016));
      if(s.life>=s.maxLife){SS.remove(s.line);s.line.geometry.dispose();s.mat.dispose();shooters.splice(i,1);}
    }
    checkProx();

  R.render(SS,CAM);
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
loop();
document.getElementById('go').addEventListener('click',()=>{
  const intro=document.getElementById('intro');
  intro.style.transition='opacity 1.8s';intro.style.opacity='0';
  setTimeout(()=>intro.style.display='none',1800);
  started=true;lastT=performance.now();
  CAM.position.set(2800,280,-1200);
  setTimeout(()=>R.domElement.requestPointerLock?.(),500);
});
window.addEventListener('resize',()=>{CAM.aspect=innerWidth/innerHeight;CAM.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
</script>
