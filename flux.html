    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import { jsx as _jsx, jsxs as _jsxs, Fragment as _Fragment } from 'react/jsx-runtime';

        const { useRef, useEffect, useState, useCallback } = React;

        // ============= TYPES =============
        const DEFAULT_CONFIG = {
            baseHue: 210,
            hueSpeed: 0.2,
            particleSpeed: 1.2,
            particleSize: 3.5,
            trailOpacity: 0.15,
            attractionForce: 0.6,
            connectionRadius: 100,
            particleCount: 2000,
            viscosity: 0.98,
            targetText: "FLUX",
            style: 'classic',
            interactionMode: 'attract',
            chaos: 0,
            enablePulse: false,
            enableOrbit: false,
            enableWarp: false,
        };

        // ============= PARTICLE CLASS =============
        class Particle {
            constructor(width, height) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.5 + 0.2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.baseRadius = Math.random() * 2 + 1.5;
                this.radius = this.baseRadius;
                this.hue = Math.random() * 360;
                this.noiseOffset = Math.random() * 1000;
                this.targetX = null;
                this.targetY = null;
                this.life = 0;
                this.char = Math.random() > 0.5 ? '1' : '0';
                this.colorVar = Math.random();
            }

            setTarget(x, y) {
                this.targetX = x;
                this.targetY = y;
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = 30 + Math.random() * 30;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
            }

            update(width, height, mouse, config, time) {
                const hasTarget = this.targetX !== null && this.targetY !== null;
                const t = time * 0.001;
                
                if (config.style === 'matrix' && Math.random() > 0.99) {
                    this.char = Math.random() > 0.5 ? '1' : '0';
                }

                const isPhysicsInteraction = mouse.isPressed && (config.style === 'vortex' || config.enableOrbit);

                let distToTarget = 0;
                let dx = 0, dy = 0;

                if (hasTarget) {
                    dx = this.targetX - this.x;
                    dy = this.targetY - this.y;
                    if (Math.abs(dx) < 100 && Math.abs(dy) < 100) {
                        distToTarget = Math.sqrt(dx * dx + dy * dy);
                    } else {
                        distToTarget = 200;
                    }
                }

                // GLOBAL EFFECTS
                if (config.enableOrbit) {
                    let cx = width / 2;
                    let cy = height / 2;
                    
                    if (mouse.isPressed) {
                        cx = mouse.x;
                        cy = mouse.y;
                    }

                    const odx = this.x - cx;
                    const ody = this.y - cy;
                    const odist = Math.sqrt(odx*odx + ody*ody) + 0.1;
                    
                    const orbitSpeed = 0.08;
                    this.vx += (-ody / odist) * orbitSpeed;
                    this.vy += (odx / odist) * orbitSpeed;

                    if (mouse.isPressed) {
                        const pullStr = 0.15;
                        this.vx -= (odx / odist) * pullStr;
                        this.vy -= (ody / odist) * pullStr;
                    } else {
                        this.vx -= (odx / odist) * 0.005;
                        this.vy -= (ody / odist) * 0.005;
                    }
                }

                if (config.enableWarp) {
                    const cx = width / 2;
                    const cy = height / 2;
                    const odx = this.x - cx;
                    const ody = this.y - cy;
                    const warpSpeed = Math.sin(t) * 0.05;
                    this.vx += odx * 0.002 + warpSpeed;
                    this.vy += ody * 0.002 + warpSpeed;
                }

                // STYLE PHYSICS
                switch(config.style) {
                    case 'fire':
                        this.vy -= 0.06;
                        this.vx += (Math.random() - 0.5) * 0.2;
                        break;
                    case 'water':
                        this.vx += Math.cos(this.y * 0.02 + t) * 0.04;
                        this.vy += Math.sin(this.x * 0.02 + t) * 0.02;
                        this.vy += 0.02;
                        break;
                    case 'sand':
                        this.vy += 0.15;
                        this.vx += (Math.random() - 0.5) * 0.05;
                        break;
                    case 'snow':
                        this.vy += 0.03;
                        this.vx += Math.sin(this.y * 0.01 + t) * 0.02;
                        break;
                    case 'pollen':
                        this.vx += (Math.random() - 0.5) * 0.1;
                        this.vy += (Math.random() - 0.5) * 0.1;
                        break;
                    case 'vortex':
                        let cx = width / 2;
                        let cy = height / 2;
                        if (mouse.isPressed) {
                            cx = mouse.x;
                            cy = mouse.y;
                        }
                        const vdx = this.x - cx;
                        const vdy = this.y - cy;
                        const dist = Math.sqrt(vdx*vdx + vdy*vdy) + 1;
                        this.vx += (-vdy / dist) * 0.2;
                        this.vy += (vdx / dist) * 0.2;
                        if (mouse.isPressed) {
                            const pull = 0.20;
                            this.vx -= (vdx / dist) * pull;
                            this.vy -= (vdy / dist) * pull;
                        } else {
                            const pull = 0.03;
                            this.vx -= (vdx / dist) * pull;
                            this.vy -= (vdy / dist) * pull;
                        }
                        break;
                    case 'lightning':
                        if (Math.random() < 0.1) {
                            this.vx += (Math.random() - 0.5) * 10;
                            this.vy += (Math.random() - 0.5) * 10;
                        }
                        break;
                    case 'classic':
                    case 'ghost':
                        const noiseScale = 0.02;
                        this.vx += Math.cos(this.y * 0.01 + t + this.noiseOffset) * noiseScale;
                        this.vy += Math.sin(this.x * 0.01 + t + this.noiseOffset) * noiseScale;
                        break;
                }

                // TARGET SEEKING
                if (hasTarget && !isPhysicsInteraction) {
                    let snapStrength = 0.2;
                    if (config.style === 'fire' || config.style === 'water' || config.style === 'sand') {
                        snapStrength = 0.05;
                    }

                    if (distToTarget < 5) {
                        this.x += dx * snapStrength;
                        this.y += dy * snapStrength;
                        this.vx *= 0.5;
                        this.vy *= 0.5;
                        const isDynamic = config.style === 'fire' || config.style === 'water' || config.style === 'vortex';
                        if (!mouse.isPressed && !config.enableOrbit && !config.enableWarp && !isDynamic) {
                            this.x = this.targetX;
                            this.y = this.targetY;
                        }
                    } else {
                        const steerPower = 0.08;
                        this.vx += dx * steerPower * 0.1;
                        this.vy += dy * steerPower * 0.1;
                        this.vx *= 0.90;
                        this.vy *= 0.90;
                    }
                } else {
                    if (config.style === 'classic' || config.style === 'matrix') {
                        this.vx += (Math.random() - 0.5) * 0.05;
                        this.vy += (Math.random() - 0.5) * 0.05;
                    }
                }

                // CHAOS
                if (config.chaos > 0) {
                    this.vx += (Math.random() - 0.5) * config.chaos * 3;
                    this.vy += (Math.random() - 0.5) * config.chaos * 3;
                }

                // MOUSE INTERACTION
                if (mouse.isPressed && !isPhysicsInteraction) {
                    const mouseDx = mouse.x - this.x;
                    const mouseDy = mouse.y - this.y;
                    if (Math.abs(mouseDx) < 300 && Math.abs(mouseDy) < 300) {
                        const mouseDist = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);
                        const maxAttractDist = 300;
                        if (mouseDist < maxAttractDist) {
                            const forceDir = config.interactionMode === 'attract' ? 1 : -1;
                            const forceMult = config.interactionMode === 'repel' ? 6 : 1.5;
                            const force = (1 - (mouseDist / maxAttractDist)) * config.attractionForce * forceMult;
                            this.vx += (mouseDx / mouseDist) * force * forceDir;
                            this.vy += (mouseDy / mouseDist) * force * forceDir;
                        }
                    }
                }

                // PHYSICS STEP
                let viscosity = config.viscosity;
                if (config.style === 'vortex' || config.style === 'fire') viscosity = 0.99;
                this.vx *= viscosity;
                this.vy *= viscosity;
                this.x += this.vx * config.particleSpeed;
                this.y += this.vy * config.particleSpeed;

                // BOUNDARIES
                const bounce = -0.6;
                if (this.x < 0) { this.x = 0; this.vx *= bounce; }
                else if (this.x > width) { this.x = width; this.vx *= bounce; }
                if (this.y < 0) { this.y = 0; this.vy *= bounce; }
                else if (this.y > height) {
                    this.y = height;
                    this.vy *= bounce;
                    if (config.style === 'sand' || config.style === 'snow') this.vx *= 0.8;
                }

                // VISUALS
                this.hue += config.hueSpeed;
                let sizePulse = 0;
                if (config.enablePulse) {
                    sizePulse = Math.sin(t * 8) * (this.baseRadius * 0.8);
                }
                this.radius = Math.max(0.5, this.baseRadius * (config.particleSize / 3) + sizePulse);
            }

            draw(ctx, config, isHighPerf) {
                const finalHue = (config.baseHue + this.hue) % 360;
                
                // MATRIX RENDERER
                if (config.style === 'matrix') {
                    ctx.fillStyle = `hsla(120, 100%, 50%, 0.9)`;
                    if (!isHighPerf) { ctx.shadowBlur = 4; ctx.shadowColor = '#0f0'; }
                    else { ctx.shadowBlur = 0; }
                    const fontSize = Math.floor(this.radius * 2.5) + 8;
                    ctx.font = `${fontSize}px monospace`;
                    ctx.fillText(this.char, this.x, this.y);
                    return;
                }

                // STYLE COLORS
                switch(config.style) {
                    case 'fire':
                        const fireHue = 0 + Math.random() * 50;
                        ctx.fillStyle = `hsla(${fireHue}, 100%, 60%, 0.9)`;
                        break;
                    case 'water':
                        const waterHue = 210 + Math.random() * 30;
                        ctx.fillStyle = `hsla(${waterHue}, 90%, 50%, 0.8)`;
                        break;
                    case 'sand':
                        const sandHue = 30 + Math.random() * 20;
                        ctx.fillStyle = `hsla(${sandHue}, 80%, 60%, 0.9)`;
                        break;
                    case 'ghost':
                        ctx.fillStyle = `hsla(0, 0%, 95%, ${0.1 + Math.random() * 0.3})`;
                        break;
                    case 'snow':
                        ctx.fillStyle = `hsla(220, 100%, 100%, 0.9)`;
                        break;
                    case 'slime':
                        ctx.fillStyle = `hsla(${80 + Math.random() * 40}, 100%, 50%, 0.8)`;
                        break;
                    case 'pollen':
                        if (this.colorVar < 0.25) ctx.fillStyle = `hsla(320, 100%, 70%, 0.9)`;
                        else if (this.colorVar < 0.5) ctx.fillStyle = `hsla(50, 100%, 60%, 0.9)`;
                        else if (this.colorVar < 0.75) ctx.fillStyle = `hsla(20, 100%, 60%, 0.9)`;
                        else ctx.fillStyle = `hsla(260, 80%, 70%, 0.9)`;
                        break;
                    case 'vortex':
                        const vHue = 260 + Math.random() * 60;
                        ctx.fillStyle = `hsla(${vHue}, 100%, 65%, 0.8)`;
                        break;
                    case 'lightning':
                        if (Math.random() > 0.9) ctx.fillStyle = '#fff';
                        else ctx.fillStyle = `hsla(50, 100%, 70%, 0.8)`;
                        break;
                    case 'cyber':
                        const cHue = Math.random() > 0.5 ? 320 : 180;
                        ctx.fillStyle = `hsla(${cHue}, 100%, 50%, 0.9)`;
                        break;
                    case 'classic':
                    default:
                        ctx.fillStyle = `hsla(${finalHue}, 90%, 60%, 1)`;
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        const offScreen = document.createElement('canvas');
                        const MAX_DIM = 800;
                        let w = img.width;
                        let h = img.height;
                        if (w > h) {
                            if (w > MAX_DIM) { h *= MAX_DIM / w; w = MAX_DIM; }
                        } else {
                            if (h > MAX_DIM) { w *= MAX_DIM / h; h = MAX_DIM; }
                        }
                        offScreen.width = w;
                        offScreen.height = h;
                        const ctx = offScreen.getContext('2d');
                        if (ctx) {
                            ctx.drawImage(img, 0, 0, w, h);
                            const imageData = ctx.getImageData(0, 0, w, h);
                            onDrawingSave(imageData);
                            onUpdate('targetText', '');
                            onExplode();
                        }
                    };
                    img.src = evt.target?.result;
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            };

            const startDrawing = (e) => {
                const canvas = drawCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                setIsDrawing(true);
                const { x, y } = getCanvasCoordinates(e);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            };

                if (!isDrawing) return;
                const canvas = drawCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                const { x, y } = getCanvasCoordinates(e);
                ctx.lineTo(x, y);
                ctx.stroke();

                if (canvas) {

                    ctx?.beginPath();
                }
            };

                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                            }
                        }
                    });
                }
            }, [isDrawingOpen]);
